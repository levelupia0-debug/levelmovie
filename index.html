          }

          .splash-text.exit { opacity: 0; transform: scale(1.2); filter: blur(30px); }
        `;

        function App() {
          const [lang, setLang] = useState(localStorage.getItem('levelmovie_lang') || 'fr');
          const [contentLang, setContentLang] = useState(localStorage.getItem('levelmovie_content_lang') || 'all');
          
          const [showSplash, setShowSplash] = useState(true);
          const [splashStep, setSplashStep] = useState(0);

          const [user, setUser] = useState(null);
          const [userName, setUserName] = useState('');
          const [userEmail, setUserEmail] = useState('');
          const [accessKey, setAccessKey] = useState('');
          const [authError, setAuthError] = useState('');
          const [isLoadingAuth, setIsLoadingAuth] = useState(false);
          const [isLoggingIn, setIsLoggingIn] = useState(false);
          const [isScrolled, setIsScrolled] = useState(false);
          const [toasts, setToasts] = useState([]);
          
          const [currentCategory, setCurrentCategory] = useState('home');
          const [searchQuery, setSearchQuery] = useState('');
          const [searchResults, setSearchResults] = useState([]);
          const [heroMovie, setHeroMovie] = useState(null);
          const [pageSeed, setPageSeed] = useState(1); 
          
          const [selectedMovie, setSelectedMovie] = useState(null);
          const [modalMode, setModalMode] = useState('info'); 
          const [showSettings, setShowSettings] = useState(false);
          const [showLogoutConfirm, setShowLogoutConfirm] = useState(false);

          const [watchlist, setWatchlist] = useState([]);
          const [watchlistData, setWatchlistData] = useState([]);
          
          const [recentlyViewed, setRecentlyViewed] = useState([]); 

          const t = i18n[lang] || i18n['fr'];
          const defaultUserName = userName || t.defaultUser;

          // --- INITIALISATION & ANIMATION SPLASH ---
          useEffect(() => {
            signInAnonymously(auth).catch(console.error);

            const savedKey = localStorage.getItem('levelmovie_saved_key');
            const savedName = localStorage.getItem('levelmovie_user_name');
            const savedUid = localStorage.getItem('levelmovie_user_uid');
            const savedEmail = localStorage.getItem('levelmovie_user_email');
            
            if (savedKey && savedUid) {
              setUser({ uid: savedUid });
              if (savedName) setUserName(savedName);
              if (savedEmail) setUserEmail(savedEmail);
            }

            const t1 = setTimeout(() => setSplashStep(1), 200);   
            const t2 = setTimeout(() => setSplashStep(2), 1400);  
            const t3 = setTimeout(() => setSplashStep(3), 2800);  
            const t4 = setTimeout(() => {
              setSplashStep(4);
              setShowSplash(false);
            }, 3200);

            const handleScroll = () => setIsScrolled(window.scrollY > 30);
            window.addEventListener('scroll', handleScroll);
            
            return () => {
                clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); clearTimeout(t4);
                window.removeEventListener('scroll', handleScroll);
            }
          }, []);

          // --- FETCH DONNÉES UTILISATEUR ---
          useEffect(() => {
            if (!user) return;
            
            const localData = JSON.parse(localStorage.getItem('levelmovie_watchlist_' + user.uid) || '[]');
            if (localData.length > 0) {
              setWatchlistData(localData);
              setWatchlist(localData.map(m => m.id));
            }

            const fetchUserData = async () => {
              try {
                // Fetch Watchlist
                const q = collection(db, "artifacts", APP_ID, "users", user.uid, "watchlist");
                const snaps = await getDocs(q);
                const data = [];
                snaps.forEach(doc => data.push(doc.data()));
                if (data.length > 0 || localData.length > 0) {
                    setWatchlist(data.map(m => m.id));
                    setWatchlistData(data);
                    localStorage.setItem('levelmovie_watchlist_' + user.uid, JSON.stringify(data));
                }

                // Fetch Preferences
                const prefSnap = await getDoc(doc(db, "artifacts", APP_ID, "users", user.uid, "preferences", "settings"));
                if (prefSnap.exists()) {
                    const pref = prefSnap.data();
                    if (pref.lang) { setLang(pref.lang); localStorage.setItem('levelmovie_lang', pref.lang); }
                    if (pref.contentLang) { setContentLang(pref.contentLang); localStorage.setItem('levelmovie_content_lang', pref.contentLang); }
                }

                // Fetch Recent History
                const histSnap = await getDoc(doc(db, "artifacts", APP_ID, "users", user.uid, "history", "recent"));
                if (histSnap.exists() && histSnap.data().items) {
                    setRecentlyViewed(histSnap.data().items);
                }

              } catch (e) {
                console.error("🔥 FIREBASE FETCH DATA ERROR:", e);
              }
            };
            fetchUserData();
          }, [user]);

          // --- TOASTS ---
          const showToast = useCallback((msg, type = 'info') => {
            if(type === 'info') return; 
            const id = Date.now() + Math.random();
            setToasts(prev => [...prev, { id, msg, type }]);
            setTimeout(() => {
              setToasts(prev => prev.filter(toastItem => toastItem.id !== id));
            }, 3000);
          }, []);

          // --- SAUVEGARDE PRÉFÉRENCES CLOUD ---
          const syncPreferencesToDb = async (newPrefs) => {
             if (!user) return;
             try {
                await setDoc(doc(db, "artifacts", APP_ID, "users", user.uid, "preferences", "settings"), newPrefs, { merge: true });
             } catch(e) {}
          };

          // --- ACTIONS LANGUE / FILTRES (BOUTONS RÉPARÉS) ---
          const handleLangToggle = () => {
            const newLang = lang === 'fr' ? 'en' : 'fr';
            setLang(newLang);
            localStorage.setItem('levelmovie_lang', newLang);
            syncPreferencesToDb({ lang: newLang });
            showToast(t.filterApplied, 'success');
          };

          const cycleContentLang = () => {
            const nextLang = contentLang === 'all' ? 'fr' : (contentLang === 'fr' ? 'en' : 'all');
            setContentLang(nextLang);
            localStorage.setItem('levelmovie_content_lang', nextLang);
            syncPreferencesToDb({ contentLang: nextLang });
            setPageSeed(prev => prev === 1 ? 2 : 1);
            showToast(t.filterApplied, 'success');
          };

          const getContentLangLabel = () => {
              if (contentLang === 'fr') return t.frenchVF;
              if (contentLang === 'en') return t.usEnglish;
              return t.worldAll;
          };

          // --- AUTHENTIFICATION ---
          const formatAccessKey = (val) => {
            let formatted = val.toUpperCase().replace(/[^A-Z0-9-]/g, '');
            setAccessKey(formatted.substring(0, 16));
          };

          const handleLogin = async () => {
            if (!accessKey) return;
            setIsLoadingAuth(true);
            setAuthError('');
            try {
              const q = collectionGroup(db, 'security');
              const querySnapshot = await getDocs(q);
              let foundUserData = null;
              querySnapshot.forEach(docSnap => {
                if (docSnap.data().key === accessKey) foundUserData = docSnap.data();
              });
              
              if (foundUserData) {
                const email = foundUserData.owner || foundUserData.email || "email@inconnu.com";
                const name = foundUserData.name || foundUserData.displayName || email.split('@')[0] || t.defaultUser;
                const uid = foundUserData.uid || accessKey;
                
                setIsLoggingIn(true);
                
                setTimeout(() => {
                    setUser({ uid });
                    setUserName(name);
                    setUserEmail(email);
                    localStorage.setItem('levelmovie_saved_key', accessKey);
                    localStorage.setItem('levelmovie_user_name', name);
                    localStorage.setItem('levelmovie_user_email', email);
                    localStorage.setItem('levelmovie_user_uid', uid);
                    showToast(t.loginSuccess, 'success');
                    setIsLoggingIn(false);
                }, 3000);
              } else {
                setAuthError(t.enterKey || "Clé invalide.");
              }
            } catch (error) {
              setAuthError("Erreur serveur Firebase.");
            }
            setIsLoadingAuth(false);
          };

                                        {getContentLangLabel()}

                            <div className="space-y-4">
                                <h3 className="text-[10px] font-black text-[#a855f7] uppercase tracking-widest pl-2 border-l-2 border-[#a855f7]">{t.systemVideo}</h3>
                                
                                <div className="flex justify-between items-center bg-white/5 p-4 rounded-xl border border-white/10 shadow-inner">

                                    <label className="relative inline-flex items-center cursor-pointer outline-none">
                                        <input type="checkbox" className="sr-only peer" />
                                        <div className="w-9 h-5 bg-black/50 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white/70 after:border-white/20 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-[#a855f7] peer-checked:after:bg-white shadow-inner"></div>
                                    </label>

                                <div className="flex justify-between items-center bg-white/5 p-4 rounded-xl border border-white/10 shadow-inner">
                                    <span className="text-[11px] font-bold text-white/80 uppercase tracking-widest flex items-center gap-3"><HardDrive className="w-4 h-4 text-[#a855f7]" /> {t.systemCache}</span>
                                    <button onClick={() => showToast(t.cacheCleared, 'success')} className="px-3 py-1.5 bg-red-500/20 text-red-400 rounded-lg text-[10px] font-bold uppercase hover:bg-red-500 hover:text-white transition-all border border-red-500/30 outline-none">{t.clearCache}</button>
                                </div>

                        <div className="w-full mt-8 pt-6 border-t border-white/10 text-center">
                            <span className="text-[10px] font-bold text-white/40 uppercase tracking-widest block mb-4">{t.ourPartners}</span>
                            <div className="flex justify-center items-center gap-6 opacity-80 flex-wrap">
                                <span className="text-sm font-black tracking-widest text-[#90cea1]">TMDB</span>
                                <span className="text-sm font-black tracking-widest text-[#f5c518]">OMDb</span>
                                <span className="text-sm font-black tracking-widest text-[#3c948b]">TVMaze</span>
                                <span className="text-sm font-black tracking-widest text-white flex items-center gap-1"><Library className="w-4 h-4"/> ARCHIVE</span>
                            </div>
                        </div>
                        
                        {!showLogoutConfirm ? (
                            <button onClick={() => setShowLogoutConfirm(true)} className="w-full text-center px-4 py-4 mt-8 bg-red-500/10 text-[11px] font-bold text-red-400 uppercase tracking-widest hover:bg-red-500/20 border border-red-500/20 rounded-xl transition-colors flex justify-center items-center gap-3 active:scale-95 shadow-md outline-none">
                                <LogOut className="w-4 h-4" /> {t.logoutBtn}
                            </button>
                        ) : (
                            <div className="w-full mt-8 bg-red-500/10 border border-red-500/30 p-5 rounded-xl flex flex-col items-center animate-in zoom-in duration-300">
                                <p className="text-red-400 font-black text-xs uppercase tracking-widest mb-4">{t.logoutConfirm}</p>
                                <div className="flex gap-4 w-full">
                                    <button onClick={() => setShowLogoutConfirm(false)} className="flex-1 py-3 bg-white/5 text-white/70 rounded-xl text-[10px] font-bold uppercase hover:bg-white/10 transition-colors outline-none">{t.cancel}</button>
                                    <button onClick={handleLogout} className="flex-1 py-3 bg-red-500 text-white rounded-xl text-[10px] font-bold uppercase shadow-[0_0_15px_rgba(239,68,68,0.4)] hover:bg-red-600 transition-colors outline-none">{t.confirm}</button>

                        )}

                        <p className="text-[9px] text-white/20 uppercase tracking-widest mt-6">{t.osVersion}</p>
                    </div>
                </div>
              )}

              {/* MODAL MOVIE */}
              {selectedMovie && (
                <MovieModal 
                  movie={selectedMovie} 
                  mode={modalMode} 
                  onClose={() => setSelectedMovie(null)} 
                  onSelectSimilar={(m) => {
                    setSelectedMovie(m);
                    setModalMode('info');
                    addToHistory(m);
                  }}
                  t={t} 
                  lang={langCode} 
                  user={user}
                  watchlist={watchlist}
                  toggleWatchlist={toggleWatchlist}
                  showToast={showToast}
                />
              )}
            </div>
          );
        }

        // --- BANNER COMPONENT ---
        function Banner({ url, onPlay, onInfo, setHero, heroMovie, t, pageSeed }) {
          useEffect(() => {
            const fetchMovie = async () => {
              try {
                const req1 = fetch(`${BASE_URL}${url}&page=${pageSeed}`);
                const req2 = fetch(`${BASE_URL}${url}&page=${pageSeed + 1}`);
                const [res1, res2] = await Promise.all([req1, req2]);
                const data1 = await res1.json();
                const data2 = await res2.json();
                const combined = [...(data1.results||[]), ...(data2.results||[])];
                
                const valids = combined.filter(m => m.backdrop_path);
                setHero(valids[Math.floor(Math.random() * valids.length)]);
              } catch(e) {}
            };
            fetchMovie();
          }, [url, pageSeed]);

          if (!heroMovie) return <div className="h-[80vh] w-full bg-[#060608] animate-pulse"></div>;

          return (
            <header className="relative h-[65vh] md:h-[80vh] min-h-[500px] text-white transition-all duration-700 bg-[#060608]" style={{ backgroundSize: 'cover', backgroundPosition: '50% 20%', backgroundImage: `url("${IMAGE_ORIGINAL}${heroMovie.backdrop_path}")` }}>
                <div className="absolute inset-0 bg-gradient-to-r from-[#060608] via-[#060608]/70 to-transparent w-full md:w-[80%]"></div>
                <div className="absolute inset-0 bg-gradient-to-t from-[#060608] via-transparent to-[#060608]/40 h-full"></div>
                
                <div className="relative z-10 flex flex-col justify-end h-full px-4 md:px-14 pb-12 md:pb-24 max-w-4xl w-full">
                    <div className="flex items-center space-x-3 mb-3 md:mb-4 animate-in slide-in-from-left duration-500">
                        <span className="text-white/80 font-black tracking-[0.3em] text-[9px] md:text-[11px] uppercase bg-white/5 px-3 py-1 rounded-full border border-white/10 shadow-sm"><LevelMovieLogo className="w-3 h-3 text-[#a855f7] inline mr-1" /> {t.featured}</span>
                    </div>
                    
                    <h1 className="text-4xl md:text-6xl lg:text-7xl font-black pb-2 tracking-tighter text-white drop-shadow-[0_0_30px_rgba(0,0,0,0.9)] leading-tight animate-in slide-in-from-bottom duration-700 line-clamp-3">
                        {heroMovie.title || heroMovie.name}
                    </h1>
                    
                    <div className="flex items-center gap-3 mt-1 mb-3 text-[10px] md:text-xs font-bold text-white/60 uppercase tracking-widest">
                        <span className="text-green-400 border border-green-400/30 bg-green-400/10 px-2 py-0.5 rounded shadow-sm">{t.match}</span>
                        <span>{(heroMovie.release_date || heroMovie.first_air_date || '').substring(0,4)}</span>
                        <span><Star className="w-3 h-3 text-[#a855f7] inline mb-0.5" /> {heroMovie.vote_average?.toFixed(1)}</span>
                    </div>

                    <p className="w-full text-[12px] md:text-[15px] text-white/80 font-medium leading-relaxed max-w-2xl text-justify drop-shadow-lg animate-in fade-in duration-1000 delay-300 line-clamp-3 md:line-clamp-4">
                        {heroMovie.overview}
                    </p>

                    <div className="flex flex-wrap gap-3 mt-5 md:mt-6">
                        <button onClick={onPlay} className="flex-1 md:flex-none items-center justify-center flex gap-2 px-6 md:px-8 py-3 bg-white text-black rounded-xl text-[11px] md:text-[13px] font-black uppercase tracking-widest hover:bg-gray-200 transition-all shadow-[0_0_30px_rgba(255,255,255,0.3)] active:scale-95 outline-none">
                            <Play className="w-4 h-4 fill-black" /> <span>{t.play}</span>
                        </button>
                        <button onClick={onInfo} className="flex-1 md:flex-none items-center justify-center flex gap-2 px-6 md:px-8 py-3 bg-white/10 border border-white/20 rounded-xl text-[11px] md:text-[13px] font-bold text-white uppercase tracking-widest hover:bg-white/20 transition-all active:scale-95 backdrop-blur-md outline-none">
                            <Info className="w-4 h-4" /> <span>{t.details}</span>
                        </button>
                    </div>
                </div>
            </header>
          );
        }

        // --- ROW COMPONENT ---
        function Row({ title, fetchUrl, isLarge, onMovieClick, pageSeed }) {
          const [movies, setMovies] = useState([]);
          const rowRef = useRef(null);

          useEffect(() => {
            const fetchM = async () => {
              try {
                const reqs = [];
                for (let i = 0; i < 4; i++) {
                    reqs.push(fetch(`${BASE_URL}${fetchUrl}&page=${pageSeed + i}`));
                }
                
                const responses = await Promise.all(reqs);
                const dataPromises = responses.map(r => r.json());
                const allData = await Promise.all(dataPromises);
                
                let combined = [];
                allData.forEach(d => {
                    if(d.results) combined = [...combined, ...d.results];
                });
                
                const uniqueMovies = Array.from(new Set(combined.map(a => a.id)))
                  .map(id => combined.find(a => a.id === id))
                  .filter(m => m && m.poster_path);

                setMovies(uniqueMovies);
              } catch(e) {}
            };
            fetchM();
          }, [fetchUrl, pageSeed]);

          let isDown = false;
          let startX;
          let scrollLeft;

          const handleMouseDown = (e) => {
            isDown = true;
            startX = e.pageX - rowRef.current.offsetLeft;
            scrollLeft = rowRef.current.scrollLeft;
          };
          const handleMouseLeave = () => { isDown = false; };
          const handleMouseUp = () => { isDown = false; };
          const handleMouseMove = (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - rowRef.current.offsetLeft;
            const walk = (x - startX) * 2; 
            rowRef.current.scrollLeft = scrollLeft - walk;
          };

          const scrollAction = (direction) => {
              const scrollAmt = 400;
              if (rowRef.current) {
                  rowRef.current.scrollBy({ left: direction === 'left' ? -scrollAmt : scrollAmt, behavior: 'smooth' });
              }
          }

          if (movies.length === 0) return null;

          return (
            <div className="group relative ml-4 md:ml-12 animate-in fade-in duration-700">
                <h2 className="text-white/90 text-[13px] md:text-lg font-black mb-3 md:mb-5 uppercase tracking-[0.2em] border-l-4 border-[#a855f7] pl-3 md:pl-4 drop-shadow-sm flex items-center gap-3">
                    {title} <ChevronRight className="w-4 h-4 text-white/30" />
                </h2>
                
                <div onClick={() => scrollAction('left')} className="absolute left-0 top-12 bottom-0 z-40 w-10 bg-gradient-to-r from-[#060608] via-[#060608]/80 to-transparent opacity-0 md:group-hover:opacity-100 flex items-center justify-start cursor-pointer transition-opacity duration-300 -ml-4 md:-ml-12 hidden md:flex outline-none">
                    <ChevronLeft className="text-white hover:text-[#a855f7] transition-colors w-10 h-10 ml-1 drop-shadow-lg" />
                </div>
                
                <div 
                  ref={rowRef}
                  onMouseDown={handleMouseDown} onMouseLeave={handleMouseLeave} onMouseUp={handleMouseUp} onMouseMove={handleMouseMove}
                  className="flex overflow-y-hidden overflow-x-scroll py-2 md:py-4 space-x-3 md:space-x-5 no-scrollbar pr-8 cursor-grab active:cursor-grabbing"
                >
                    {movies.map(movie => {
                      const imgClass = isLarge ? 'w-[140px] md:w-[200px] h-[210px] md:h-[300px]' : 'w-[200px] md:w-[260px] h-[112px] md:h-[146px]';
                      const imgSrc = `${IMAGE_BASE_URL}${isLarge ? movie.poster_path : (movie.backdrop_path || movie.poster_path)}`;
                      return (
                          <div key={movie.id} className="relative flex-none movie-card-hover cursor-pointer rounded-xl overflow-hidden shadow-lg border border-white/5 bg-[#151520]" onClick={() => onMovieClick(movie)}>
                              <img className={`object-cover ${imgClass} transition-opacity duration-500`} src={imgSrc} loading="lazy" alt="" draggable="false"/>
                              <div className="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent opacity-0 hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-3 md:p-4 pointer-events-none">
                                  <p className="text-white font-black text-[10px] md:text-sm uppercase tracking-wider truncate drop-shadow-md">{movie.title || movie.name}</p>
                                  <div className="flex items-center gap-2 mt-1 md:mt-2">
                                      <span className="text-[#a855f7] font-bold text-[9px] md:text-[10px]"><Star className="w-3 h-3 inline mb-0.5" /> {movie.vote_average?.toFixed(1)}</span>
                                  </div>
                              </div>
                          </div>
                      )
                    })}
                </div>
                
                <div onClick={() => scrollAction('right')} className="absolute right-0 top-12 bottom-0 z-40 w-12 bg-gradient-to-l from-[#060608] via-[#060608]/80 to-transparent opacity-0 md:group-hover:opacity-100 flex items-center justify-end cursor-pointer transition-opacity duration-300 hidden md:flex outline-none">
                    <ChevronRight className="text-white hover:text-[#a855f7] transition-colors w-10 h-10 mr-2 drop-shadow-lg" />
                </div>
            </div>
          )
        }

        // --- MODAL MOVIE ---
        function MovieModal({ movie, mode, onClose, onSelectSimilar, t, lang, user, watchlist, toggleWatchlist, showToast }) {
          const [details, setDetails] = useState(null);
          const [loading, setLoading] = useState(true);
          const [error, setError] = useState(false);
          const [modalMode, setModalMode] = useState(mode);
          
          const [showDisclaimer, setShowDisclaimer] = useState(false);
          const [disclaimerAccepted, setDisclaimerAccepted] = useState(false);
          const [selectedServer, setSelectedServer] = useState('vidsrc_me'); 
          const [pendingServer, setPendingServer] = useState('vidsrc_me');
          const [iframeLoading, setIframeLoading] = useState(true);

          const isTV = movie.first_air_date !== undefined;
          const typeStr = isTV ? 'tv' : 'movie';
          const isAddedToWatchlist = watchlist.includes(movie.id);
          
          useEffect(() => {
            const fetchDetails = async () => {
              try {
                const res = await fetch(`${BASE_URL}/${typeStr}/${movie.id}?api_key=${API_KEY}&language=${lang}&append_to_response=credits,similar,watch/providers,videos,reviews&include_video_language=fr,en`);
                const data = await res.json();
                setDetails(data);
                setLoading(false);
              } catch (e) {
                setError(true);
                setLoading(false);
              }
            };
            fetchDetails();
          }, [movie, typeStr, lang]);

          useEffect(() => {
            if (mode === 'play') {
               handlePlayRequest('vidsrc_me');
            } else {
               setModalMode('info');
            }
          }, [mode]);

          const handleShare = () => {
            const url = `https://www.themoviedb.org/${typeStr}/${movie.id}`;
            const text = `${t.share} "${movie.title || movie.name}" !`;
            if (navigator.share) {
              navigator.share({ title: 'LevelMovie', text: text, url: url }).catch(()=>{});
            } else {
              navigator.clipboard.writeText(`${text} ${url}`);
              showToast(t.linkCopied, 'success');
            }
          };

          const getTrailerKey = () => {
            if (!details?.videos?.results) return '';
            const frTrailer = details.videos.results.find(v => v.type === 'Trailer' && v.site === 'YouTube' && v.iso_639_1 === 'fr');
            if (frTrailer) return frTrailer.key;
            const anyTrailer = details.videos.results.find(v => v.type === 'Trailer' && v.site === 'YouTube');
            return anyTrailer ? anyTrailer.key : (details.videos.results[0]?.key || '');
          };

          const getYoutubeFullKey = () => {
            if (!details?.videos?.results) return null;
            const full = details.videos.results.find(v => v.type === 'Feature Film' && v.site === 'YouTube');
            return full ? full.key : null;
          };

          const getProviders = () => {
            const region = lang === 'fr-FR' ? 'FR' : 'US';
            const providerData = details?.['watch/providers']?.results?.[region];
            if (!providerData) return null;
            
            const allProviders = [...(providerData.flatrate || []), ...(providerData.free || []), ...(providerData.ads || [])];
            const unique = [];
            const seen = new Set();
            for (const p of allProviders) {
                if (!seen.has(p.provider_id)) {
                    seen.add(p.provider_id);
                    unique.push(p);
                }
            }
            return unique.length > 0 ? { unique, link: providerData.link } : null;
          };

          const handlePlayRequest = (serverId) => {
              if (!disclaimerAccepted) {
                  setPendingServer(serverId);
                  setShowDisclaimer(true);
              } else {
                  if (selectedServer !== serverId) setIframeLoading(true);
                  setSelectedServer(serverId);
                  setModalMode('play');
              }
          };

          const getFormatRuntime = () => {
            if(!details) return '';
            if (details.runtime) {
                const h = Math.floor(details.runtime / 60);
                const m = details.runtime % 60;
                return `${h}h ${m}m`;
            } else if (details.episode_run_time && details.episode_run_time.length > 0) {
                return `${details.episode_run_time[0]} min/ep`;
            }
            return '';
          };

          const getDirector = () => {
              if(!details) return t.notSpecified;
              let directors = [];
              if (details.credits && details.credits.crew) {
                  directors = details.credits.crew.filter(c => c.job === 'Director').map(c => c.name);
              }
              if (directors.length === 0 && details.created_by) {
                  directors = details.created_by.map(c => c.name);
              }
              return directors.length > 0 ? directors.join(', ') : t.notSpecified;
          };

          const renderIframe = () => {
            if (modalMode === 'info') {
              const tKey = getTrailerKey();
              if (movie.backdrop_path) {
                return (
                   <div className="absolute inset-0 w-full h-full group cursor-pointer bg-black" onClick={() => { 
                      if (tKey) {
                          setIframeLoading(true);
                          setModalMode('trailer'); 
                      }
                      else showToast(t.notFound, 'error'); 
                   }}>
                      <img src={`${IMAGE_ORIGINAL}${movie.backdrop_path}`} className="absolute inset-0 w-full h-full object-cover opacity-50 group-hover:opacity-30 transition-opacity duration-500" alt="" draggable="false" />
                      {tKey && (
                        <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                          <div className="w-16 h-16 md:w-20 md:h-20 rounded-full bg-black/60 border border-white/20 flex items-center justify-center group-hover:scale-110 group-hover:bg-[#a855f7]/90 group-hover:border-[#a855f7] transition-all shadow-[0_0_30px_rgba(0,0,0,0.5)] backdrop-blur-sm">
                            <Play className="w-8 h-8 md:w-10 md:h-10 fill-white text-white ml-1 md:ml-1.5 opacity-80 group-hover:opacity-100" />
                          </div>
                          <span className="mt-4 text-[10px] md:text-xs font-bold text-white/70 uppercase tracking-[0.2em] group-hover:text-white transition-colors">{t.trailer}</span>
                        </div>
                      )}
                   </div>
                );
              }
              return <div className="absolute inset-0 bg-black flex items-center justify-center text-white/30"><Film className="w-16 h-16" /></div>;
            }

            if (modalMode === 'trailer') {
              const tKey = getTrailerKey();
              if (tKey) {
                return (
                  <>
                      <div className="absolute inset-0 flex items-center justify-center bg-black/80 z-0">
                          <div className="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-[#a855f7]"></div>
                      </div>
                      <iframe key={`trailer-${tKey}`} className={`absolute inset-0 w-full h-full bg-black z-10 transition-opacity duration-500 ${iframeLoading ? 'opacity-0' : 'opacity-100'}`} src={`https://www.youtube.com/embed/${tKey}?autoplay=1&controls=1&modestbranding=1&rel=0&playsinline=1`} onLoad={() => setIframeLoading(false)} allow="autoplay; encrypted-media; picture-in-picture" frameBorder="0" allowFullScreen></iframe>
                  </>
                );
              }
              return <div className="absolute inset-0 bg-black flex flex-col items-center justify-center text-white/50"><Clapperboard className="w-12 h-12 mb-2 opacity-50"/><span>{t.notFound}</span></div>;
            }

            let iframeSrc = '';
            if (selectedServer === 'youtube_full' && getYoutubeFullKey()) {
                iframeSrc = `https://www.youtube.com/embed/${getYoutubeFullKey()}?autoplay=1`;
            } else if (selectedServer === 'vidsrc') {
                iframeSrc = `https://vidsrc.to/embed/${typeStr}/${movie.id}`;
            } else if (selectedServer === 'vidsrc_me') {
                iframeSrc = `https://vidsrc.me/embed/${typeStr}?tmdb=${movie.id}`;
            } else if (selectedServer === 'embedsu') {
                iframeSrc = `https://embed.su/embed/${typeStr}/${movie.id}`;
            } else if (selectedServer === 'superembed') {
                iframeSrc = `https://multiembed.mov/?video_id=${movie.id}&tmdb=1`;
            } else if (selectedServer === 'archive') {
                const title = movie.title || movie.name;
                const suffix = lang === 'fr-FR' ? ' film complet' : ' full movie';
                const q = encodeURIComponent(title + suffix);
                iframeSrc = `https://www.youtube.com/embed?listType=search&list=${q}&autoplay=1`;
            }

            return (
                <>
                    <div className="absolute inset-0 flex items-center justify-center bg-black/80 z-0">
                        <div className="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-[#a855f7]"></div>
                    </div>
                    <iframe key={iframeSrc} className={`absolute inset-0 w-full h-full bg-transparent z-10 transition-opacity duration-500 ${iframeLoading ? 'opacity-0' : 'opacity-100'}`} src={iframeSrc} onLoad={() => setIframeLoading(false)} frameBorder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowFullScreen></iframe>
                </>
            );
          };

          return (
            <div className="fixed inset-0 z-[8000] flex justify-center items-start md:items-center p-0 md:p-6 bg-[#060608]/95 backdrop-blur-3xl overflow-y-auto no-scrollbar">
                <div className="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-[#a855f7]/10 rounded-full blur-[150px] pointer-events-none z-0"></div>
                <div className="fixed inset-0 z-0" onClick={onClose}></div>

                {/* MODAL AVERTISSEMENT */}
                {showDisclaimer && (
                  <div className="fixed inset-0 z-[9999] bg-black/90 backdrop-blur-md flex items-center justify-center p-4 overflow-y-auto">
                    <div className="bg-[#0a0a0f] border border-[#a855f7]/30 rounded-3xl p-6 md:p-8 max-w-xl w-full shadow-[0_0_50px_rgba(168,85,247,0.2)] animate-in zoom-in duration-300">
                       <h3 className="text-xl md:text-2xl font-black text-white mb-4 uppercase tracking-widest flex items-center gap-3 border-b border-white/10 pb-4">
                         <AlertTriangle className="text-red-500 w-8 h-8" /> {t.warningTitle}
                       </h3>
                       
                       <div className="bg-gradient-to-r from-purple-900/40 to-pink-900/40 border border-[#a855f7]/50 p-5 rounded-2xl mb-6 shadow-[0_0_20px_rgba(168,85,247,0.15)]">
                          <h4 className="text-white font-black text-sm md:text-base mb-2 tracking-widest">{t.recommendationTitle}</h4>
                          <p className="text-white/80 text-xs md:text-sm leading-relaxed" dangerouslySetInnerHTML={{__html: t.recommendationText}}></p>
                       </div>

                       <p className="text-white/60 text-[10px] md:text-xs leading-relaxed mb-6 text-justify">
                          {t.warningDisclaimer}
                       </p>
                       
                       <div className="flex flex-wrap gap-4 mb-8 justify-center">
                          <div className="flex items-center gap-2 bg-white/5 border border-white/10 px-4 py-2 rounded-xl shadow-inner">
                             <svg viewBox="0 0 512 512" className="w-5 h-5" fill="#FF1B2D"><path d="M255.8 48C141 48 48 141.2 48 256s93 208 207.8 208c115 0 208.2-93.2 208.2-208S370.8 48 255.8 48zm0 338.5c-56 0-101.2-58.5-101.2-130.5 0-72 45.2-130.5 101.2-130.5 56 0 101.2 58.5 101.2 130.5 0 72-45.2 130.5-101.2 130.5z"/></svg>
                             <span className="text-[11px] font-bold text-white tracking-widest uppercase">Opera</span>
                          </div>
                          <div className="flex items-center gap-2 bg-white/5 border border-white/10 px-4 py-2 rounded-xl shadow-inner">
                             <svg viewBox="0 0 24 24" className="w-5 h-5 text-[#FF4724]" fill="currentColor"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                             <span className="text-[11px] font-bold text-white tracking-widest uppercase">Brave</span>
                          </div>
                       </div>

                       <label className="flex items-start gap-3 cursor-pointer mb-8 bg-white/5 p-4 rounded-xl border border-white/10 hover:bg-white/10 transition-colors shadow-sm outline-none">
                          <input type="checkbox" checked={disclaimerAccepted} onChange={(e) => setDisclaimerAccepted(e.target.checked)} className="mt-0.5 w-5 h-5 accent-[#a855f7] cursor-pointer" />
                          <span className="text-white/90 text-xs md:text-sm font-bold leading-tight">{t.disclaimerCheckbox}</span>
                       </label>

                       <div className="flex justify-end gap-3 border-t border-white/10 pt-6">
                          <button onClick={() => setShowDisclaimer(false)} className="px-6 py-3 rounded-xl font-bold text-[11px] uppercase tracking-widest text-white/50 hover:text-white hover:bg-white/5 transition-colors outline-none">{t.cancel}</button>
                          <button disabled={!disclaimerAccepted} onClick={() => {
                              setShowDisclaimer(false);
                              setSelectedServer(pendingServer);
                              setModalMode('play');
                          }} className="px-8 py-3 bg-[#a855f7] text-white rounded-xl font-black text-[11px] uppercase tracking-widest disabled:opacity-50 disabled:cursor-not-allowed hover:bg-purple-500 transition-all shadow-[0_0_20px_rgba(168,85,247,0.4)] outline-none">{t.acceptPlay}</button>
                       </div>
                    </div>
                  </div>
                )}
                
                <div className="holo-card relative w-full min-h-[100vh] md:min-h-0 md:h-auto max-h-full md:max-h-[90vh] max-w-6xl md:rounded-[2rem] overflow-x-hidden overflow-y-auto shadow-[0_0_80px_rgba(0,0,0,0.9)] border-white/10 animate-in slide-in-from-bottom md:zoom-in duration-300 flex flex-col bg-[#0a0a0f] z-10 md:my-auto my-0">
                    
                    <div className="w-full bg-[#0a0a0f] border-b border-white/5 flex justify-between items-center px-4 md:px-8 py-3 shrink-0 sticky top-0 z-[60] shadow-md">
                        <div className="flex items-center gap-2">
                            <LevelMovieLogo className="w-4 h-4 text-[#a855f7]" />
                            <span className="text-white font-black tracking-[0.2em] text-[12px] uppercase drop-shadow-md">Level<span className="text-[#a855f7]">Movie</span></span>
                        </div>
                        <button onClick={onClose} className="flex items-center gap-2 px-5 py-2 bg-red-500/10 text-red-400 border border-red-500/30 rounded-xl text-[10px] md:text-[11px] font-black uppercase tracking-widest hover:bg-red-500 hover:text-white transition-all shadow-sm active:scale-95 outline-none">
                            <X className="w-3 h-3" /> <span>{t.closePlayer}</span>
                        </button>
                    </div>
                    
                    <div className="relative pt-[56.25%] md:pt-[45%] w-full bg-black shrink-0 overflow-hidden border-b border-[#a855f7]/30 shadow-lg">
                        {loading ? (
                          <div className="absolute inset-0 flex items-center justify-center bg-black/80">
                            <div className="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-[#a855f7]"></div>
                          </div>
                        ) : error ? (
                          <div className="absolute inset-0 flex flex-col items-center justify-center bg-[#060608] text-center p-6 border-b border-[#a855f7]/30">
                            <LevelMovieLogo className="w-12 h-12 text-[#a855f7] mb-6 opacity-80" />
                            <div className="bg-red-500/10 p-4 rounded-full mb-4">
                                <AlertTriangle className="w-8 h-8 text-red-400" />
                            </div>
                            <h3 className="text-lg font-black mb-2 text-white uppercase tracking-widest drop-shadow-md">{t.notFound}</h3>
                            <p className="text-white/60 text-xs max-w-sm">{t.contentUnavailableDesc}</p>
                          </div>
                        ) : renderIframe()}
                    </div>
                    
                    <div className="p-5 md:p-10 shrink-0 bg-gradient-to-b from-[#15092a]/40 to-transparent h-full pb-24">
                        
                        {modalMode === 'play' && (
                          <div className="mb-8 flex flex-col gap-5 bg-black/40 p-5 md:p-6 rounded-2xl border border-white/5 shadow-inner">
                              <div className="flex justify-between items-center mb-2">
                                  <span className="text-[11px] font-black text-white/70 uppercase tracking-widest"><Server className="w-4 h-4 inline mr-2 text-[#a855f7]" /> {t.externalSources}</span>
                                  <button onClick={() => setModalMode('info')} className="text-[10px] font-bold text-white/50 hover:text-white uppercase tracking-widest border border-white/10 px-3 py-1.5 rounded-lg hover:bg-white/10 transition-colors outline-none"><Info className="w-3 h-3 inline mr-1" /> {t.movieInfo}</button>
                              </div>
                              <p className="text-[10px] text-[#a855f7] mb-2 font-bold uppercase tracking-widest">
                                  <Info className="w-3 h-3 inline mr-1" /> {t.audioTip}
                              </p>
                              <div className="flex flex-wrap gap-3">
                                  {['vidsrc_me', 'superembed'].map((srv, index) => (
                                    <button key={srv} onClick={() => handlePlayRequest(srv)} className={`px-4 py-2.5 rounded-xl text-[10px] font-bold uppercase transition-all outline-none ${selectedServer === srv ? 'bg-[#a855f7] text-white border border-[#a855f7]/30 shadow-[0_0_15px_rgba(168,85,247,0.3)]' : 'bg-white/5 text-white/70 border border-white/10 hover:bg-white/10'}`}>
                                      {index === 0 ? t.server1 : t.server2}
                                    </button>
                                  ))}
                                  
                                  {/* Domaine Public */}
                                  {(movie.release_date && parseInt(movie.release_date.substring(0, 4)) <= 1970) && (
                                    <button onClick={() => handlePlayRequest('archive')} className={`px-4 py-2.5 rounded-xl text-[10px] font-bold uppercase transition-all outline-none ${selectedServer === 'archive' ? 'bg-[#a855f7] text-white border border-[#a855f7]/30 shadow-[0_0_15px_rgba(168,85,247,0.3)]' : 'bg-white/5 text-white/70 border border-white/10 hover:bg-white/10'}`}>
                                      <Library className="w-3 h-3 inline mr-1 text-gray-400" /> {t.publicDomainDirect}
                                    </button>
                                  )}
                                  
                                  {/* Serveur Direct (HD) */}
                                  {getYoutubeFullKey() && (
                                    <button onClick={() => handlePlayRequest('youtube_full')} className={`ml-auto px-4 py-2.5 rounded-xl text-[10px] font-bold uppercase transition-all outline-none ${selectedServer === 'youtube_full' ? 'bg-[#a855f7] text-white border border-[#a855f7]/50 shadow-[0_0_15px_rgba(168,85,247,0.4)]' : 'bg-white/5 text-white/70 border border-white/20 hover:bg-white/10'}`}>
                                      <Clapperboard className="w-3 h-3 inline mr-1 text-[#a855f7]" /> {t.youtubeFull}
                                    </button>
                                  )}
                              </div>
                          </div>
                        )}

                        {(modalMode === 'info' || modalMode === 'trailer') && details && (
                          <div className="flex flex-col lg:flex-row gap-8 lg:gap-12">
                              <div className="flex-1">
                                  <h2 className="text-3xl md:text-5xl font-black mb-2 text-white uppercase tracking-tighter drop-shadow-lg leading-tight">
                                    {movie.title || movie.name || movie.original_name}
                                  </h2>
                                  <div className="text-[#a855f7] italic text-sm md:text-base font-medium mb-4 drop-shadow-sm flex items-center gap-2">
                                      <span>{details.tagline ? `"${details.tagline}"` : ''}</span>
                                  </div>

                                  <div className="flex items-center space-x-3 mb-6 flex-wrap gap-y-3">
                                      <span className="text-green-400 font-black text-[11px] md:text-[12px] uppercase tracking-widest border border-green-400/30 px-2 py-1 rounded bg-green-400/10 shadow-sm">{t.match}</span>
                                      {details.status && <span className="text-blue-400 font-bold text-[10px] md:text-[11px] uppercase tracking-widest border border-blue-400/30 px-2 py-1 rounded bg-blue-400/10">{details.status}</span>}
                                      <span className="text-white/80 font-bold text-[12px] md:text-[13px] border-l border-white/20 pl-3">{(movie.release_date || movie.first_air_date || '').substring(0, 4)}</span>
                                      <span className="text-white/80 font-bold text-[12px] md:text-[13px] border-l border-white/20 pl-3">{getFormatRuntime()}</span>
                                      {details.original_language && <span className="text-white/60 font-bold text-[11px] uppercase tracking-widest border-l border-white/20 pl-3">{t.originalLang}: {details.original_language.toUpperCase()}</span>}
                                      <span className="px-2 py-1 border border-white/20 rounded text-[10px] font-bold text-white uppercase tracking-widest bg-white/5 shadow-sm border-l border-white/20 pl-3 ml-2">HD 1080p</span>
                                  </div>

                                  <div className="mb-4">
                                      <span className="text-white/40 font-bold text-[10px] uppercase tracking-widest block mb-1">{t.originalTitle}</span>
                                      <span className="text-white/70 font-medium text-[12px] italic">{details.original_title || details.original_name || t.notSpecified}</span>
                                  </div>

                                  {/* Légal */}
                                  {getProviders() ? (
                                    <div className="mb-6 p-5 bg-white/5 rounded-2xl border border-white/10 shadow-inner">
                                      <h4 className="text-white/50 text-[10px] md:text-xs uppercase font-bold tracking-widest mb-3 flex items-center gap-2"><Play className="w-4 h-4 text-green-400" /> {t.legalWatch}</h4>
                                      <div className="flex flex-wrap gap-3">
                                        {getProviders().unique.slice(0,8).map(p => (
                                          <a key={p.provider_id} href={getProviders().link} target="_blank" rel="noreferrer" className="flex items-center gap-2 bg-white/10 hover:bg-white/20 border border-white/20 rounded-xl px-4 py-2 transition-all hover:scale-105 active:scale-95 no-underline shadow-sm outline-none">
                                              <img src={`https://image.tmdb.org/t/p/w45${p.logo_path}`} className="w-5 h-5 rounded-md shadow-sm" alt="" draggable="false"/>
                                              <span className="text-[11px] font-bold text-white">{p.provider_name}</span>
                                          </a>
                                        ))}
                                      </div>
                                    </div>
                                  ) : (
                                    <div className="mb-6 p-5 bg-white/5 rounded-2xl border border-white/10 shadow-inner">
                                       <h4 className="text-white/50 text-[10px] md:text-xs uppercase font-bold tracking-widest mb-3 flex items-center gap-2"><Play className="w-4 h-4 text-green-400" /> {t.legalWatch}</h4>
                                       <p className="text-white/40 text-[11px] italic">{t.noLegal}</p>
                                    </div>
                                  )}

                                  <div className="flex flex-wrap gap-3 mb-6">
                                      <button onClick={() => handlePlayRequest(selectedServer)} className="flex-1 sm:flex-none items-center justify-center flex gap-2 px-8 py-3.5 bg-gradient-to-r from-purple-600 to-pink-600 text-white rounded-xl text-[11px] md:text-[13px] font-black uppercase tracking-widest hover:opacity-90 transition-all shadow-[0_0_20px_rgba(168,85,247,0.4)] active:scale-95 outline-none">
                                          <Play className="w-4 h-4 fill-white" /> <span>{t.playMovie}</span>
                                      </button>
                                      
                                      <button 
                                          onClick={() => {
                                              if (modalMode !== 'trailer') {
                                                  setIframeLoading(true);
                                                  setModalMode('trailer');
                                                  const modalHoloCard = document.querySelector('.holo-card');
                                                  if (modalHoloCard) modalHoloCard.scrollTo({top: 0, behavior: 'smooth'});
                                              }
                                          }} 
                                          disabled={modalMode === 'trailer'}
                                          className={`flex-1 sm:flex-none items-center justify-center flex gap-2 px-6 py-3.5 rounded-xl text-[11px] md:text-[13px] font-black uppercase tracking-widest transition-all active:scale-95 outline-none ${
                                              modalMode === 'trailer' 
                                              ? 'bg-[#a855f7]/10 border border-[#a855f7]/50 text-[#a855f7] cursor-default shadow-inner' 
                                              : 'bg-white/5 border border-white/20 text-white hover:bg-white/10 backdrop-blur-md shadow-md'
                                          }`}>
                                          {modalMode === 'trailer' ? (
                                              <>
                                                  <div className="flex gap-1 items-center justify-center">
                                                      <div className="w-1.5 h-1.5 bg-[#a855f7] rounded-full animate-bounce"></div>
                                                      <div className="w-1.5 h-1.5 bg-[#a855f7] rounded-full animate-bounce" style={{animationDelay: "0.1s"}}></div>
                                                      <div className="w-1.5 h-1.5 bg-[#a855f7] rounded-full animate-bounce" style={{animationDelay: "0.2s"}}></div>
                                                  </div> 
                                                  <span>{t.trailerPlaying}</span>
                                              </>
                                          ) : (
                                              <><Clapperboard className="w-4 h-4" /> <span>{t.trailer}</span></>
                                          )}
                                      </button>
                                  </div>

                                  <div className="markdown-pro pr-2 text-justify">
                                    {movie.overview ? movie.overview.split('\n').filter(p=>p.trim()).map((p,i) => <p key={i} className="mb-3">{p}</p>) : <p>{t.noDesc}</p>}
                                  </div>
                                  
                                  <div className="mt-8 flex gap-4 pt-6 border-t border-white/10">
                                      <button onClick={() => toggleWatchlist(movie)} className={`flex-1 flex items-center justify-center gap-3 px-5 py-3 rounded-xl border transition-all active:scale-95 outline-none ${isAddedToWatchlist ? 'bg-green-500/10 border-green-500/30 text-green-400' : 'bg-white/5 border-white/20 text-white/80 hover:bg-white/10'}`}>
                                          {isAddedToWatchlist ? <><CheckCircle className="w-5 h-5" /><span className="text-[10px] md:text-[11px] font-bold uppercase tracking-widest">{t.alreadyInList}</span></> : <><Plus className="w-5 h-5 text-[#a855f7]" /><span className="text-[10px] md:text-[11px] font-bold uppercase tracking-widest">{t.addToList}</span></>}
                                      </button>
                                      <button onClick={handleShare} className="flex items-center justify-center gap-3 px-6 py-3 rounded-xl border border-white/20 bg-white/5 text-white/80 hover:text-white hover:bg-white/10 transition-all active:scale-95 outline-none">
                                          <Share2 className="w-5 h-5 text-blue-400" />
                                      </button>
                                  </div>
                              </div>
                              
                              <div className="w-full lg:w-[35%] space-y-6 bg-black/40 p-5 md:p-6 rounded-2xl border border-white/5 shadow-inner h-fit">
                                  <div>
                                      <span className="text-white/40 font-bold block mb-3 uppercase tracking-widest text-[10px] flex items-center gap-2"><Users className="w-4 h-4 text-[#a855f7]" /> <span>{t.cast}</span></span>
                                      <div className="flex gap-4 overflow-x-auto no-scrollbar pb-2 row-container cursor-grab active:cursor-grabbing">
                                          {details.credits?.cast?.slice(0, 15).map(c => (
                                            <div key={c.id} className="flex flex-col items-center min-w-[70px] gap-1 shrink-0 select-none">
                                                <img src={c.profile_path ? `https://image.tmdb.org/t/p/w185${c.profile_path}` : `https://ui-avatars.com/api/?name=${encodeURIComponent(c.name)}&background=151520&color=a855f7`} className="w-12 h-12 md:w-14 md:h-14 rounded-full object-cover border border-white/10 shadow-md bg-black/50" draggable="false" alt=""/>
                                                <span className="text-[9px] text-white/90 text-center font-bold w-[80px] truncate px-1 mt-1">{c.name}</span>
                                                {c.character && <span className="text-[8px] text-[#a855f7] truncate w-[80px] text-center mt-0.5">{c.character}</span>}
                                            </div>
                                          )) || <span className="text-white/50 text-xs">{t.noCasting}</span>}
                                      </div>
                                  </div>
                                  <div className="w-full h-px bg-white/10"></div>
                                  <div>
                                      <span className="text-white/40 font-bold block mb-1 uppercase tracking-widest text-[10px] flex items-center gap-2"><Film className="w-4 h-4 text-[#a855f7]" /> {t.director}</span>
                                      <span className="text-white/90 font-medium text-[12px] block mt-2">{getDirector()}</span>
                                  </div>
                                  <div className="w-full h-px bg-white/10"></div>
                                  <div>
                                      <span className="text-white/40 font-bold block mb-1 uppercase tracking-widest text-[10px] flex items-center gap-2"><Tags className="w-4 h-4 text-[#a855f7]" /> {t.genresOrigin}</span>
                                      <span className="text-white/90 font-bold text-[11px] uppercase tracking-widest leading-relaxed block mt-2">
                                        {details.genres?.map(g => <span key={g.id} className="bg-white/10 px-2 py-1 rounded inline-block mb-1 mr-1">{g.name}</span>)}
                                      </span>
                                      <span className="text-white/50 font-medium text-[10px] block mt-2 uppercase tracking-widest">
                                        {details.production_countries?.map(c => c.name).join(', ')}
                                      </span>
                                  </div>
                                  <div className="w-full h-px bg-white/10"></div>
                                  <div>
                                      <span className="text-white/40 font-bold block mb-1 uppercase tracking-widest text-[10px] flex items-center gap-2"><Building className="w-4 h-4 text-[#a855f7]" /> {t.prodFinance}</span>
                                      <span className="text-white/90 font-medium text-[12px] block mt-2">
                                        {details.production_companies?.length > 0 ? details.production_companies.map(c=>c.name).join(', ') : "LevelUp Entertainment"}
                                      </span>
                                      <span className="text-white/50 font-medium text-[10px] block mt-1">
                                        {[
                                          details.budget ? `${t.budget}: $${(details.budget/1000000).toFixed(1)}M` : null,
                                          details.revenue ? `${t.revenue}: $${(details.revenue/1000000).toFixed(1)}M` : null
                                        ].filter(Boolean).join(' • ')}
                                      </span>
                                  </div>
                                  <div className="w-full h-px bg-white/10"></div>
                                  <div>
                                      <span className="text-white/40 font-bold block mb-1 uppercase tracking-widest text-[10px] flex items-center gap-2"><Star className="w-4 h-4 text-yellow-500 fill-yellow-500" /> {t.tmdbReviews}</span>
                                      <div className="mt-2 text-[11px] text-white/60 font-bold tracking-wide flex items-center gap-2">
                                          <span className="text-yellow-400 text-base">{details.vote_average ? details.vote_average.toFixed(1) : 'N/A'}</span> <span className="text-white/40">/ 10</span>
                                          <span className="border-l border-white/20 pl-2 ml-1">{details.vote_count || 0} {t.certifiedReviews}</span>
                                      </div>
                                      {details.reviews?.results?.length > 0 && (
                                        <div className="mt-4 p-4 bg-white/5 rounded-xl border border-white/10 text-[11px] text-white/70 italic leading-relaxed shadow-inner">
                                          "{details.reviews.results[0].content.length > 250 ? details.reviews.results[0].content.substring(0, 250) + '...' : details.reviews.results[0].content}"
                                          <br/><span className="text-[#a855f7] font-bold mt-2 block">- {details.reviews.results[0].author}</span>
                                        </div>
                                      )}
                                  </div>
                              </div>
                          </div>
                        )}
                        
                        {details && details.similar?.results?.length > 0 && (
                          <div className="mt-12 pt-8 border-t border-white/10">
                              <h3 className="text-white/90 text-sm md:text-base font-black mb-5 uppercase tracking-[0.2em] border-l-4 border-[#a855f7] pl-3">{t.similar}</h3>
                              <div className="flex overflow-x-auto gap-4 no-scrollbar pb-4 row-container cursor-grab active:cursor-grabbing">
                                  {details.similar.results.slice(0, 10).map(sm => {
                                    if(!sm.poster_path) return null;
                                    return (
                                      <div key={sm.id} className="relative flex-none cursor-pointer rounded-xl overflow-hidden shadow-lg border border-white/5 bg-[#151520] hover:scale-105 transition-transform w-[120px] md:w-[150px] h-[180px] md:h-[225px]" onClick={() => onSelectSimilar(sm)}>
                                          <img className="object-cover w-full h-full" src={`${IMAGE_BASE_URL}${sm.poster_path}`} loading="lazy" draggable="false" alt=""/>
                                      </div>
                                    )
                                  })}
                              </div>
                          </div>
                        )}
                    </div>
                </div>
            </div>
          );
        }

        // Rendu de l'application
        const rootElement = document.getElementById('root');
        const root = createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
