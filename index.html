// --- CAPTURE DU LIEN D'INVITATION ET SSO (MÉMOIRE PERSISTANTE) ---
const urlParams = new URLSearchParams(window.location.search);
let shouldUpdateUrl = false;

// 1. Capture du SSO depuis l'Écosystème
const ssoKey = urlParams.get('lvl_key');
if (ssoKey) {
    localStorage.setItem('levelmovie_saved_key', ssoKey);
    const ssoUid = urlParams.get('lvl_uid');
    if (ssoUid) localStorage.setItem('levelmovie_user_uid', ssoUid);
    const ssoName = urlParams.get('lvl_name');
    if (ssoName) localStorage.setItem('levelmovie_user_name', ssoName);
    const ssoEmail = urlParams.get('lvl_email');
    if (ssoEmail) localStorage.setItem('levelmovie_user_email', ssoEmail);
    const ssoPhoto = urlParams.get('lvl_photo');
    if (ssoPhoto) localStorage.setItem('lm_photo', ssoPhoto);
    
    // Nettoyage des paramètres d'URL pour sécuriser la clé
    urlParams.delete('lvl_key');
    urlParams.delete('lvl_uid');
    urlParams.delete('lvl_name');
    urlParams.delete('lvl_photo');
    urlParams.delete('lvl_email');
    shouldUpdateUrl = true;
}

// 2. Capture de l'invitation Watch Party
const partyParam = urlParams.get('party');
if (partyParam) {
    localStorage.setItem('pending_party_join', partyParam);
    urlParams.delete('party');
    shouldUpdateUrl = true;
}

// 3. Appliquer la nouvelle URL propre (si modifiée)
if (shouldUpdateUrl) {
    let newUrl = window.location.pathname;
    if (urlParams.toString()) newUrl += '?' + urlParams.toString();
    window.history.replaceState({}, document.title, newUrl);
}

const getBrowserData = () => {
    const ua = navigator.userAgent;
    if (/Brave/i.test(ua) || (navigator.brave && navigator.brave.isBrave)) return { name: 'Brave', id: 'brave' };
    if (/Edg/i.test(ua)) return { name: 'Edge', id: 'edge' };
    if (/Firefox|FxiOS/i.test(ua)) return { name: 'Firefox', id: 'firefox' };
    if (/GSA/i.test(ua)) return { name: 'Google', id: 'google' };
    if (/Chrome|CriOS/i.test(ua)) return { name: 'Chrome', id: 'chrome' };
    if (/Safari/i.test(ua)) return { name: 'Safari', id: 'safari' };
    return { name: null, id: null };
};

const BAD_WORDS = ['putain', 'merde', 'connard', 'connasse', 'salope', 'fdp', 'ntm', 'tg', 'encule', 'enculé', 'bite', 'couille', 'chier', 'fuck', 'shit', 'bitch', 'asshole', 'cunt', 'dick', 'pussy', 'slut', 'whore', 'nigger', 'nigga', 'faggot', 'pédé'];
const censorText = (text) => {
    if (!text) return text;
    let censored = text;
    BAD_WORDS.forEach(word => {
        const regex = new RegExp(`\\b${word}\\b`, 'gi');
        censored = censored.replace(regex, (match) => '*'.repeat(match.length));
    });
    return censored;
};

// 1. Initialiser l'Authentification Firebase EN PREMIER
useEffect(() => {
    const initAuth = async () => {
        try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                try {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } catch (tokenError) {
                    await signInAnonymously(auth);
                }
            } else {
                await signInAnonymously(auth);
            }
        } catch(e) { console.error("Erreur Auth:", e); }
    };
    initAuth();
    
    const unsubscribe = onAuthStateChanged(auth, setFbUser);
    return () => unsubscribe();
}, []);

// 2. Écouter la maintenance SEULEMENT après l'authentification
useEffect(() => {
    if (!fbUser) return;
    const unsubMaintenance = onSnapshot(doc(db, "artifacts", APP_ID, "public", "data", "system", "config"), (docSnap) => {
            if (docSnap.exists() && docSnap.data().levelmovie_maintenance === true) {
                setIsMaintenance(true);
            } else {
                setIsMaintenance(false);
            }
        });
    return () => unsubMaintenance();
}, [fbUser]);

// 3. Logique locale et UI
useEffect(() => {
    const userAgent = navigator.userAgent || navigator.vendor || window.opera;
    const isOpera = /OPR|OPT|OPiOS|Opera|Opera Mini/i.test(userAgent) || (!!window.opera);
    setIsAllowedBrowser(isOpera);

    const savedKey = localStorage.getItem('levelmovie_saved_key');
    const savedName = localStorage.getItem('levelmovie_user_name');
    const savedUid = localStorage.getItem('levelmovie_user_uid');
    const savedEmail = localStorage.getItem('levelmovie_user_email');
    const savedPhoto = localStorage.getItem('lm_photo');

    // Toujours afficher l'animation, connecté ou pas
    const t1 = setTimeout(() => setSplashStep(1), 100);
    const t2 = setTimeout(() => setSplashStep(2), 800);
    const t3 = setTimeout(() => setSplashStep(3), 1600);
    const t4 = setTimeout(() => {
        setSplashStep(4);
        setShowSplash(false);
    }, 2000);

    if (savedKey && savedUid) {
        setUser({ uid: savedUid });
        if (savedName) setUserName(savedName);
        if (savedEmail) setUserEmail(savedEmail);
        if (savedPhoto) setUserPhoto(savedPhoto);
        
        const handleScroll = () => setIsScrolled(window.scrollY > 30);
        window.addEventListener('scroll', handleScroll);

        return () => {
            clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); clearTimeout(t4);
            window.removeEventListener('scroll', handleScroll);
        }
    } else {
        // Utilisateur NON connecté : On nettoie juste les timers
        return () => {
            clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); clearTimeout(t4);
        }
    }
}, []);

const joinPartyByCode = async (codeStr, currentUser, currentName, currentPhoto) => {
    const uid = currentUser?.uid || user?.uid;
    const name = currentName || defaultUserName;
    const photo = currentPhoto || userPhoto || "";

    if (!codeStr || !uid) return;
    const cleanCode = codeStr.trim().toUpperCase();

    const inputEl = document.getElementById('partyCodeInput');
    if (inputEl) { inputEl.value = ''; inputEl.blur(); }

    try {
        const pRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'parties', cleanCode);
        const pSnap = await getDoc(pRef);
        if (pSnap.exists()) {
            const d = pSnap.data();

            if (d.status === 'ended') {
                showToast(t.eventEnded, "error");
                localStorage.removeItem('pending_party_join');
                localStorage.removeItem('active_party_id');
                return;
            }

            if (d.banned && d.banned.includes(uid)) {
                showToast(t.youAreBanned, "error");
                localStorage.removeItem('pending_party_join');
                return;
            }

            if (d.members && d.members.length >= 25) {
                showToast(t.roomFull, "error");
                localStorage.removeItem('pending_party_join');
                return;
            }

            const res = await fetch(`${BASE_URL}/${d.mediaType}/${d.movieId}?api_key=${API_KEY}&language=${lang === 'fr' ? 'fr-FR' : 'en-US'}`);
            const movieData = await res.json();
            setCurrentCategory('party');
            setPartyId(cleanCode);
            localStorage.setItem('active_party_id', cleanCode);
            openModal(movieData, 'play');
            
            if (!d.members.some(m => m.uid === uid)) {
                await updateDoc(pRef, { 
                    members: arrayUnion({ uid: uid, name: name, photo: photo }),
                    messages: arrayUnion({ isSystem: true, action: 'JOIN', name: name, photo: photo, uid: uid, time: Date.now() })
                });
            }
            syncPreferencesToDb({ activePartyId: cleanCode });
            localStorage.removeItem('pending_party_join');
        } else {
            showToast(t.invalidPartyCode, "error");
            localStorage.removeItem('pending_party_join');
            localStorage.removeItem('active_party_id');
        }
    } catch(e) { console.error(e); }
};

const rejoinActiveParty = async (pData) => {
    const res = await fetch(`${BASE_URL}/${pData.mediaType}/${pData.movieId}?api_key=${API_KEY}&language=${langCode}`);
    const movieData = await res.json();
    openModal(movieData, 'play');
};

const triggerJoinParty = (code) => {
    const seen = localStorage.getItem('lm_party_tutorial_seen');
    if (!seen) {
        setPendingPartyAction({ type: 'join', code });
        setShowPartyTutorial(true);
    } else {
        joinPartyByCode(code);
    }
};

const acceptPartyTutorial = () => {
    localStorage.setItem('lm_party_tutorial_seen', 'true');
    setShowPartyTutorial(false);
    if (pendingPartyAction?.type === 'create') {
        setCreatePartyMovie(pendingPartyAction.movie);
        setCustomRoomName("");
        setShowCreatePartyPrompt(true);
    } else if (pendingPartyAction?.type === 'join') {
        joinPartyByCode(pendingPartyAction.code);
    }
    setPendingPartyAction(null);
};

useEffect(() => {
if (!user || !fbUser) return;

const localData = JSON.parse(localStorage.getItem('levelmovie_watchlist_' + user.uid) || '[]');
if (localData.length > 0) {
setWatchlistData(localData);
setWatchlist(localData.map(m => m.id));
}

const fetchUserData = async () => {
try {
const q = collection(db, "artifacts", APP_ID, "users", user.uid, "watchlist");
const snaps = await getDocs(q);
const data = [];
snaps.forEach(doc => data.push(doc.data()));
if (data.length > 0 || localData.length > 0) {
setWatchlist(data.map(m => m.id));
setWatchlistData(data);
localStorage.setItem('levelmovie_watchlist_' + user.uid, JSON.stringify(data));
}

const prefSnap = await getDoc(doc(db, "artifacts", APP_ID, "users", user.uid, "preferences", "settings"));
if (prefSnap.exists()) {
const pref = prefSnap.data();
if (pref.lang) { setLang(pref.lang); localStorage.setItem('levelmovie_lang', pref.lang); }
if (pref.contentLang) { setContentLang(pref.contentLang); localStorage.setItem('levelmovie_content_lang', pref.contentLang); }
if (pref.parentalFilter !== undefined) setParentalFilter(pref.parentalFilter);
if (pref.parentalPin !== undefined) setParentalPin(pref.parentalPin);
}

const histSnap = await getDoc(doc(db, "artifacts", APP_ID, "users", user.uid, "history", "recent"));
if (histSnap.exists() && histSnap.data().items) {
setRecentlyViewed(histSnap.data().items);
}

if (prefSnap.exists() && prefSnap.data().activePartyId) {
    const actId = prefSnap.data().activePartyId;
    try {
        const pRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'parties', actId);
        const pSnap = await getDoc(pRef);
        if (pSnap.exists() && pSnap.data().status !== 'ended') {
            const d = pSnap.data();
            if (!(d.banned && d.banned.includes(user.uid))) {
                if (d.hostUid === user.uid || (d.members && d.members.some(m => m.uid === user.uid))) {
                    if (localStorage.getItem('active_party_id') !== actId) {
                        showToast(t.roomResumeHost, "success");
                        localStorage.setItem('active_party_id', actId);
                        setPartyId(actId);
                        setCurrentCategory('party');
                        const res = await fetch(`${BASE_URL}/${d.mediaType}/${d.movieId}?api_key=${API_KEY}&language=${lang === 'fr' ? 'fr-FR' : 'en-US'}`);
                        const movieData = await res.json();
                        openModal(movieData, 'play');
                    }
                }
            }
        } else {
            syncPreferencesToDb({ activePartyId: null });
        }
    } catch(e) {}
}

const pendingParty = localStorage.getItem('pending_party_join');
const activeParty = localStorage.getItem('active_party_id');

if (pendingParty) {
    triggerJoinParty(pendingParty);
} else if (activeParty) {
    setPartyId(activeParty);
}

} catch (e) {
console.error("🔥 FIREBASE FETCH DATA ERROR:", e);
}
};
fetchUserData();
}, [user, fbUser]);

// WATCH PARTY SYNC LISTENER
useEffect(() => {
if (!partyId || !fbUser) {
setPartyData(null);
document.body.classList.remove('party-mode');
return;
}
if (selectedMovie) document.body.classList.add('party-mode');

const unsubscribe = onSnapshot(doc(db, 'artifacts', APP_ID, 'public', 'data', 'parties', partyId), (docSnap) => {
if (docSnap.exists() && docSnap.data().status !== 'ended') {
    const data = docSnap.data();
    if (data.banned && data.banned.includes(user?.uid)) {
        setBannedInfo({ roomName: data.roomName || data.title });
        setPartyId(null);
        setPartyData(null);
        setSelectedMovie(null);
        syncPreferencesToDb({ activePartyId: null });
        localStorage.removeItem('active_party_id');
        document.body.classList.remove('party-mode');
        setCurrentCategory('home');
        return;
    }
    if (data.members && !data.members.some(m => m.uid === user?.uid)) {
        setPartyId(null);
        setPartyData(null);
        setSelectedMovie(null);
        syncPreferencesToDb({ activePartyId: null });
        localStorage.removeItem('active_party_id');
        document.body.classList.remove('party-mode');
        setCurrentCategory('home');
        return;
    }
    setPartyData(data);
} else {
    if (docSnap.exists() && docSnap.data().status === 'ended') {
        setRoomEndedInfo({ roomName: docSnap.data().roomName || docSnap.data().title, title: docSnap.data().title });
    } else if (partyData) {
        setRoomEndedInfo({ roomName: partyData.roomName || partyData.title, title: partyData.title });
    }
    
    setPartyId(null);
    setPartyData(null);
    setSelectedMovie(null);
    syncPreferencesToDb({ activePartyId: null });
    localStorage.removeItem('active_party_id');
    document.body.classList.remove('party-mode');
    setCurrentCategory('home');
}
}, (error) => {
    console.error("Erreur de synchronisation du salon:", error);
});

return () => {
    unsubscribe();
    document.body.classList.remove('party-mode');
};
}, [partyId, selectedMovie, user, fbUser]);

useEffect(() => {
const checkScroll = (e) => {
const target = e.target;
let currentScroll = 0;
let maxScroll = 1;

if (target === document || target === window) {
const scrollPos = window.scrollY + window.innerHeight;
const scrollHeight = document.documentElement.scrollHeight;
setIsNearBottom(scrollHeight - scrollPos < 150);

currentScroll = window.scrollY;
maxScroll = scrollHeight - window.innerHeight;
} 
else if (target && target.classList && target.classList.contains('overflow-y-auto')) {
const isModalNearBottom = target.scrollHeight - target.scrollTop - target.clientHeight < 150;
setIsNearBottom(isModalNearBottom);

currentScroll = target.scrollTop;
maxScroll = target.scrollHeight - target.clientHeight;
}

if (maxScroll > 0) {
setScrollProgress(Math.min(100, Math.max(0, (currentScroll / maxScroll) * 100)));
} else {
setScrollProgress(0);
}
};

window.addEventListener('scroll', checkScroll, true);
window.addEventListener('resize', checkScroll);
return () => {
window.removeEventListener('scroll', checkScroll, true);
window.removeEventListener('resize', checkScroll);
};
}, []);

const executeSmartScroll = () => {
const modal = document.querySelector('.overflow-y-auto');
if (modal && getComputedStyle(modal).overflowY === 'auto' && modal.scrollHeight > modal.clientHeight) {
const isModalNearBottom = modal.scrollHeight - modal.scrollTop - modal.clientHeight < 150;
if (isModalNearBottom) {
modal.scrollTo({ top: 0, behavior: 'smooth' });
} else {
modal.scrollBy({ top: modal.clientHeight * 0.7, behavior: 'smooth' });
}
return;
}

if (isNearBottom) {
window.scrollTo({ top: 0, behavior: 'smooth' });
} else {
window.scrollBy({ top: window.innerHeight * 0.7, behavior: 'smooth' });
}
};

const handleLogin = async () => {
    const finalKey = accessKey.trim();
    if (!finalKey) return;
    setIsLoadingAuth(true);
    setAuthError('');
    try {
        if (!auth.currentUser) {
            await signInAnonymously(auth);
        }
        
        let foundUserData = null;

        try {
            const q = collectionGroup(db, 'security');
            const querySnapshot = await getDocs(q);
            querySnapshot.forEach(docSnap => {
                if (docSnap.data().key === finalKey) foundUserData = docSnap.data();
            });
        } catch (err) {}

        if (!foundUserData) {
            try {
                const q2 = collection(db, 'artifacts', APP_ID, 'public', 'data', 'security');
                const snap2 = await getDocs(q2);
                snap2.forEach(docSnap => {
                    if (docSnap.data().key === finalKey) foundUserData = docSnap.data();
                });
            } catch (err) {}
        }

        if (!foundUserData) {
            try {
                const docRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'security', finalKey);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    foundUserData = docSnap.data();
                }
            } catch(err) {}
        }

        if (foundUserData) {
            const email = foundUserData.owner || foundUserData.email || "email@inconnu.com";
            const name = foundUserData.name || foundUserData.displayName || email.split('@')[0] || t.defaultUser;
            const uid = foundUserData.uid || finalKey;
            const photo = localStorage.getItem('lm_photo') || foundUserData.photoUrl || foundUserData.photo || null;

            setIsLoadingAuth(false);
            setIsLoggingIn(true);

            setTimeout(() => {
                setUser({ uid });
                setUserName(name);
                setUserEmail(email);
                if (photo) setUserPhoto(photo);
                
                localStorage.setItem('levelmovie_saved_key', finalKey);
                localStorage.setItem('levelmovie_user_name', name);
                localStorage.setItem('levelmovie_user_email', email);
                localStorage.setItem('levelmovie_user_uid', uid);
                if(photo) localStorage.setItem('lm_photo', photo);
                
                showToast(t.loginSuccess, 'success');
                setIsLoggingIn(false);

                const pendingParty = localStorage.getItem('pending_party_join');
                if (pendingParty) { triggerJoinParty(pendingParty); }

            }, 2000);
        } else {
            setAuthError(t.enterKey || "Clé invalide.");
            setIsLoadingAuth(false);
        }
    } catch (error) {
        setAuthError(lang === 'fr' ? "Connexion impossible. Vérifiez votre réseau ou votre clé." : "Connection failed. Check your key.");
        setIsLoadingAuth(false);
    }
};

    if (forceClose || user.uid === partyData.hostUid) {
        if (!forceClose && partyData.mods && partyData.mods.length > 0) {
            const newHost = partyData.mods[0];
            const memberToRemove = partyData.members.find(m => m.uid === user.uid);
            await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'parties', partyId), {
                hostUid: newHost,
                mods: arrayRemove(newHost),
                members: arrayRemove(memberToRemove),
                messages: arrayUnion({ isSystem: true, action: 'LEAVE', name: defaultUserName, photo: userPhoto || "", uid: user.uid, time: Date.now() })
            });
        } else {
            await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'parties', partyId), { status: 'ended' });
        }
    } else {
        const memberToRemove = partyData.members.find(m => m.uid === user.uid);
        if (memberToRemove) {
            let updates = {
                members: arrayRemove(memberToRemove),
                messages: arrayUnion({ isSystem: true, action: 'LEAVE', name: defaultUserName, photo: userPhoto || "", uid: user.uid, time: Date.now() })
            };
            if (partyData.mods?.includes(user.uid)) {
                updates.mods = arrayRemove(user.uid);
            }
            await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'parties', partyId), updates);
        }
    }
    
    setPartyId(null);
    setPartyData(null);
    setSelectedMovie(null);
    syncPreferencesToDb({ activePartyId: null });
    localStorage.removeItem('active_party_id');
    document.body.classList.remove('party-mode');

} catch(e) {}
};

function Row({ title, fetchUrl, isLarge, shuffle, onMovieClick, pageSeed, parentalFilter }) {
const [movies, setMovies] = useState([]);
const rowRef = useRef(null);

useEffect(() => {
const fetchM = async () => {
try {
const reqs = [];
for (let i = 0; i < 2; i++) {
reqs.push(fetch(`${BASE_URL}${fetchUrl}&page=${pageSeed + i}`));
}

const responses = await Promise.all(reqs);
const dataPromises = responses.map(r => r.json());
const allData = await Promise.all(dataPromises);

let combined = [];
allData.forEach(d => {
if(d.results) combined = [...combined, ...d.results];
});

let uniqueMovies = Array.from(new Set(combined.map(a => a.id)))
.map(id => combined.find(a => a.id === id))
.filter(m => m && m.poster_path);

if (parentalFilter) {
    uniqueMovies = uniqueMovies.filter(m => m.adult !== true);
}

if (shuffle) {
    uniqueMovies = uniqueMovies.sort(() => Math.random() - 0.5);
}

setMovies(uniqueMovies.slice(0, 30));
} catch(e) {}
};
fetchM();
}, [fetchUrl, pageSeed, shuffle, parentalFilter]);

let isDown = false;
let startX;
let scrollLeft;

const handleMouseDown = (e) => {
isDown = true;
startX = e.pageX - rowRef.current.offsetLeft;
scrollLeft = rowRef.current.scrollLeft;
};
const handleMouseLeave = () => { isDown = false; };
const handleMouseUp = () => { isDown = false; };
const handleMouseMove = (e) => {
if (!isDown) return;
e.preventDefault();
const x = e.pageX - rowRef.current.offsetLeft;
const walk = (x - startX) * 2;
rowRef.current.scrollLeft = scrollLeft - walk;
};

const scrollAction = (direction) => {
const scrollAmt = 400;
if (rowRef.current) {
rowRef.current.scrollBy({ left: direction === 'left' ? -scrollAmt : scrollAmt, behavior: 'smooth' });
}
}

if (movies.length === 0) return null;

return (
<div className="group relative ml-4 md:ml-12 animate-in fade-in duration-700">
<h2 className="text-white/90 text-[13px] md:text-lg font-black mb-3 md:mb-5 uppercase tracking-[0.2em] border-l-4 border-[#a855f7] pl-3 md:pl-4 drop-shadow-sm flex items-center gap-3">
{title} <ChevronRight className="w-4 h-4 text-white/30" />
</h2>

<div onClick={() => scrollAction('left')} className="absolute left-0 top-12 bottom-0 z-40 w-10 bg-gradient-to-r from-[#060608] via-[#060608]/80 to-transparent opacity-0 md:group-hover:opacity-100 flex items-center justify-start cursor-pointer transition-opacity duration-300 -ml-4 md:-ml-12 hidden md:flex outline-none">
<ChevronLeft className="text-white hover:text-[#a855f7] transition-colors w-10 h-10 ml-1 drop-shadow-lg" />
</div>

<div
ref={rowRef}
onMouseDown={handleMouseDown} onMouseLeave={handleMouseLeave} onMouseUp={handleMouseUp} onMouseMove={handleMouseMove}
className="flex overflow-y-hidden overflow-x-scroll py-2 md:py-4 space-x-3 md:space-x-5 no-scrollbar pr-8 cursor-grab active:cursor-grabbing"
>
{movies.map(movie => {
const imgClass = isLarge ? 'w-[140px] md:w-[200px] h-[210px] md:h-[300px]' : 'w-[200px] md:w-[260px] h-[112px] md:h-[146px]';
const imgSrc = `${IMAGE_BASE_URL}${isLarge ? movie.poster_path : (movie.backdrop_path || movie.poster_path)}`;
return (
<div key={movie.id} className="relative flex-none movie-card-hover cursor-pointer rounded-xl overflow-hidden shadow-lg border border-white/5 bg-[#151520]" onClick={() => onMovieClick(movie)}>
<img className={`object-cover ${imgClass} transition-opacity duration-500`} src={imgSrc} loading="lazy" alt="" draggable="false"/>
<div className="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent opacity-0 hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-3 md:p-4 pointer-events-none">
<p className="text-white font-black text-[10px] md:text-sm uppercase tracking-wider truncate drop-shadow-md">{movie.title || movie.name}</p>
<div className="flex items-center gap-2 mt-1 md:mt-2">
<span className="text-[#a855f7] font-bold text-[9px] md:text-[10px]"><Star className="w-3 h-3 inline mb-0.5" /> {movie.vote_average?.toFixed(1)}</span>
</div>
</div>
</div>
)
})}
</div>

<div onClick={() => scrollAction('right')} className="absolute right-0 top-12 bottom-0 z-40 w-12 bg-gradient-to-l from-[#060608] via-[#060608]/80 to-transparent opacity-0 md:group-hover:opacity-100 flex items-center justify-end cursor-pointer transition-opacity duration-300 hidden md:flex outline-none">
<ChevronRight className="text-white hover:text-[#a855f7] transition-colors w-10 h-10 mr-2 drop-shadow-lg" />
</div>
</div>
)
}

function MovieModal({ movie, mode, onClose, onSelectSimilar, t, lang, user, userPhoto, defaultUserName, watchlist, toggleWatchlist, showToast, handleCreateParty, partyId, partyData, handleSendPartyMessage, sendSystemAction, handlePartySyncAction, handleLeaveParty, db, APP_ID, isPartyCategory }) {
const [details, setDetails] = useState(null);
const [loading, setLoading] = useState(true);
const [error, setError] = useState(false);
const [modalMode, setModalMode] = useState(mode);

const [showDisclaimer, setShowDisclaimer] = useState(false);
const [disclaimerAccepted, setDisclaimerAccepted] = useState(false);
const [selectedServer, setSelectedServer] = useState('vidsrc_me');
const [pendingServer, setPendingServer] = useState('vidsrc_me');
const [iframeLoading, setIframeLoading] = useState(true);

const AVAILABLE_SERVERS = [
    { id: 'vidsrc_me', name: '1. GLOBAL' },
    { id: 'superembed', name: '2. MULTI' },
    { id: 'vidlink', name: '3. ALPHA' },
    { id: 'vidsrc_to', name: '4. BETA' },
    { id: 'vidsrc_pro', name: '5. GAMMA' },
    { id: 'smashy', name: '6. DELTA' }
];

const [chatInput, setChatInput] = useState('');
const [replyingTo, setReplyingTo] = useState(null);
const chatEndRef = useRef(null);

const [syncCountdown, setSyncCountdown] = useState(0);
const [localPauseState, setLocalPauseState] = useState({ show: false, estimatedTime: 0 });
const [showLeavePartyConfirm, setShowLeavePartyConfirm] = useState(false);
const [showHostLeaveWarning, setShowHostLeaveWarning] = useState(false);
const [showInviteModal, setShowInviteModal] = useState(false);

const [showUserSearch, setShowUserSearch] = useState(false);
const [friendSearchQuery, setFriendSearchQuery] = useState('');
const [friendResults, setFriendResults] = useState([]);

const [memberMenu, setMemberMenu] = useState(null);

const isTV = movie.first_air_date !== undefined;
const typeStr = isTV ? 'tv' : 'movie';
const isAddedToWatchlist = watchlist.includes(movie.id);

useEffect(() => {
const fetchDetails = async () => {
try {
const res = await fetch(`${BASE_URL}/${typeStr}/${movie.id}?api_key=${API_KEY}&language=${lang}&append_to_response=credits,similar,watch/providers,videos,reviews&include_video_language=fr,en`);
const data = await res.json();
setDetails(data);
setLoading(false);
} catch (e) {
setError(true);
setLoading(false);
}
};
fetchDetails();
}, [movie, typeStr, lang]);

// Force movie playback if entering watch party
useEffect(() => {
if (mode === 'play' || partyId) {
    if (!disclaimerAccepted && !partyId) {
        setShowDisclaimer(true);
    } else {
        setModalMode('play');
        if(partyId) setDisclaimerAccepted(true);
    }
} else {
    setModalMode('info');
}
}, [mode, partyId]);

useEffect(() => {
    let timer;
    if (iframeLoading && (modalMode === 'play' || modalMode === 'trailer')) {
        timer = setTimeout(() => {
            setIframeLoading(false); // Coupe-circuit après 8s (anti bug chargement infini)
        }, 8000);
    }
    return () => clearTimeout(timer);
}, [iframeLoading, modalMode, selectedServer]);

useEffect(() => {
if (!partyData) return;
if (partyData.status === 'play_countdown') {
    setLocalPauseState({ show: false, estimatedTime: 0 });
    const elapsed = Math.floor((Date.now() - partyData.syncTime) / 1000);
    let remaining = 5 - elapsed;
    if (remaining > 0) {
        setSyncCountdown(remaining);
        const iv = setInterval(() => {
            remaining -= 1;
            setSyncCountdown(remaining);
            if (remaining <= 0) clearInterval(iv);
        }, 1000);
        return () => clearInterval(iv);
    } else {
        setSyncCountdown(0);
    }
} else if (partyData.status === 'pause') {
    setSyncCountdown(0);
    setLocalPauseState({ show: true, estimatedTime: partyData.currentOffset || 0 });
}
}, [partyData]);

useEffect(() => {
if (chatEndRef.current) {
    chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
}
}, [partyData?.messages]);

useEffect(() => {
if (!showUserSearch || friendSearchQuery.trim().length < 1) {
    setFriendResults([]);
    return;
}
const searchUsers = async () => {
    try {
        const q = collectionGroup(db, 'security');
        const snaps = await getDocs(q);
        const results = [];
        const queryLower = friendSearchQuery.trim().toLowerCase();
        
        snaps.forEach(doc => {
            const data = doc.data();
            const userNameStr = data.name || data.displayName || (data.email ? data.email.split('@')[0] : 'Inconnu');
            const userUid = data.uid || data.key;
            
            if (userUid && userNameStr.toLowerCase().includes(queryLower)) {
                results.push({ uid: userUid, name: userNameStr, email: data.owner || data.email, photo: null });
            }
        });
        
        const uniqueResults = Array.from(new Map(results.map(item => [item.uid, item])).values());
        setFriendResults(uniqueResults);
    } catch(e) {}
};
const delay = setTimeout(searchUsers, 500);
return () => clearTimeout(delay);
}, [friendSearchQuery, showUserSearch]);

const handleInviteUser = async (friend) => {
    const inviteDataStr = localStorage.getItem(`lm_invites_${user.uid}`);
    let inviteData = inviteDataStr ? JSON.parse(inviteDataStr) : { count: 0, emails: [], weekStart: Date.now() };
    
    if (Date.now() - inviteData.weekStart > 7 * 24 * 60 * 60 * 1000) {
        inviteData = { count: 0, emails: [], weekStart: Date.now() };
    }
    
    if (inviteData.count >= 5) {
        showToast(t.inviteLimitReached, "error");
        return;
    }
    
    if (inviteData.emails.includes(friend.email)) {
        showToast(t.inviteAlreadySent, "error");
        return;
    }

    try {
        const keyDoc = await getDoc(doc(db, "artifacts", APP_ID, "system", "keys"));
        let emailjs_service = "service_yzyqexy";
        let emailjs_template = "template_c0eotmg";
        let emailjs_public = "7UQM4yu7KUSpooMy9";

        if (keyDoc.exists() && keyDoc.data().emailjs_public) {
            emailjs_service = keyDoc.data().emailjs_service;
            emailjs_template = keyDoc.data().emailjs_template;
            emailjs_public = keyDoc.data().emailjs_public;
        }

        emailjs.init(emailjs_public);
        await emailjs.send(emailjs_service, emailjs_template, {
            email: friend.email,
            to_email: friend.email,
            to_name: friend.name,
            from_name: defaultUserName,
            message: `Rejoins ma Watch Party sur LevelMovie ! Le code d'accès de la room est : ${partyId}`,
            code: partyId
        });
        
        inviteData.count += 1;
        inviteData.emails.push(friend.email);
        localStorage.setItem(`lm_invites_${user.uid}`, JSON.stringify(inviteData));

        showToast(`${t.inviteSent.replace('!', '')} à ${friend.name}`, 'success');
        setShowUserSearch(false);
        setFriendSearchQuery('');
    } catch (error) {
        console.error("Erreur EmailJS", error);
    }
};

const openMemberMenu = (member) => {
    if (member.uid !== user.uid) {
        setMemberMenu(member);
    }
};

const handlePromoteMod = async (memberUid) => {
    if (user?.uid !== partyData.hostUid) return;
    const currentMods = partyData.mods || [];
    if (currentMods.length >= 4) {
        showToast(t.modLimitReached, "error");
        return;
    }
    try {
        await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'parties', partyId), {
            modInvites: arrayUnion(memberUid)
        });
        showToast("Invitation envoyée au membre.", "success");
        setMemberMenu(null);
    } catch(e) {}
}

const handleDemoteMod = async (memberUid) => {
    if (user?.uid !== partyData.hostUid) return;
    try {
        await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'parties', partyId), {
            mods: arrayRemove(memberUid)
        });
        showToast(t.filterApplied, "success");
        setMemberMenu(null);
    } catch(e) {}
}

const handleBanUser = async (member) => {
    if (!partyData) return;
    const isHost = user?.uid === partyData.hostUid;
    const isMod = partyData.mods?.includes(user?.uid);
    const targetIsHost = member.uid === partyData.hostUid;
    const targetIsMod = partyData.mods?.includes(member.uid);
    
    // Vérification des permissions
    if ((isHost && !targetIsHost) || (isMod && !targetIsHost && !targetIsMod)) {
        try {
            const memberToRemove = partyData.members.find(m => m.uid === member.uid);
            if (memberToRemove) {
                await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'parties', partyId), {
                    members: arrayRemove(memberToRemove),
                    banned: arrayUnion(member.uid),
                    messages: arrayUnion({ isSystem: true, action: 'BAN', name: defaultUserName, targetName: member.name, photo: userPhoto || "", uid: user.uid, time: Date.now() })
                });
            }
            setMemberMenu(null);
        } catch(e) {}
    }
}

const handleMuteUser = async (memberUid) => {
    if (!partyData) return;
    const isHost = user?.uid === partyData.hostUid;
    const isMod = partyData.mods?.includes(user?.uid);
    const targetIsHost = memberUid === partyData.hostUid;
    const targetIsMod = partyData.mods?.includes(memberUid);
    
    // Un modérateur ne peut pas muter l'hôte ou un autre modérateur
    if ((isHost && !targetIsHost) || (isMod && !targetIsHost && !targetIsMod)) {
        try {
            await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'parties', partyId), {
                muted: arrayUnion({ uid: memberUid, by: defaultUserName })
            });
            setMemberMenu(null);
            showToast(t.filterApplied, "info");
        } catch(e) {}
    }
}

const handleUnmuteUser = async (member) => {
    if (!partyData) return;
    const isHost = user?.uid === partyData.hostUid;
    const isMod = partyData.mods?.includes(user?.uid);
    
    if (isHost || isMod) {
        try {
            const muteObj = partyData.muted?.find(m => m.uid === member.uid);
            if (muteObj) {
                await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'parties', partyId), {
                    muted: arrayRemove(muteObj)
                });
            }
            setMemberMenu(null);
            showToast(t.filterApplied, "info");
        } catch(e) {}
    }
}

const confirmLeave = () => {
    if (user?.uid === partyData?.hostUid && partyData.members.length > 1 && (!partyData.mods || partyData.mods.length === 0)) {
        setShowHostLeaveWarning(true);
        setShowLeavePartyConfirm(false);
    } else {
        handleLeaveParty();
        setShowLeavePartyConfirm(false);
        setShowHostLeaveWarning(false);
    }
};

const handleShare = () => {
const url = `https://www.themoviedb.org/${typeStr}/${movie.id}`;
const text = `${t.share} "${movie.title || movie.name}" !`;
if (navigator.share) {

const getTrailerKey = () => {
if (!details?.videos?.results) return '';
const frTrailer = details.videos.results.find(v => v.type === 'Trailer' && v.site === 'YouTube' && v.iso_639_1 === 'fr');
if (frTrailer) return frTrailer.key;
const anyTrailer = details.videos.results.find(v => v.type === 'Trailer' && v.site === 'YouTube');
return anyTrailer ? anyTrailer.key : (details.videos.results.find(v => v.site === 'YouTube')?.key || '');
};

const getYoutubeFullKey = () => {
if (!details?.videos?.results) return null;
const full = details.videos.results.find(v => v.type === 'Feature Film' && v.site === 'YouTube');
return full ? full.key : null;
};

const getProviders = () => {
const region = lang === 'fr-FR' ? 'FR' : 'US';
const providerData = details?.['watch/providers']?.results?.[region];
if (!providerData) return null;

const allProviders = [...(providerData.flatrate || []), ...(providerData.free || []), ...(providerData.ads || [])];
const unique = [];
const seen = new Set();
for (const p of allProviders) {
if (!seen.has(p.provider_id)) {
seen.add(p.provider_id);
unique.push(p);
}
}
return unique.length > 0 ? { unique, link: providerData.link } : null;
};

const handlePlayRequest = (serverId) => {

setPendingServer(serverId);
setShowDisclaimer(true);

setSelectedServer(serverId);
setModalMode('play');
}
};

const getFormatRuntime = () => {
if(!details) return '';
if (details.runtime) {
const h = Math.floor(details.runtime / 60);
const m = details.runtime % 60;
return `${h}h ${m}m`;
} else if (details.episode_run_time && details.episode_run_time.length > 0) {
return `${details.episode_run_time[0]} min/ep`;
}
return '';
};

const getDirector = () => {
if(!details) return t.notSpecified;
let directors = [];
if (details.credits && details.credits.crew) {
directors = details.credits.crew.filter(c => c.job === 'Director').map(c => c.name);
}
if (directors.length === 0 && details.created_by) {
directors = details.created_by.map(c => c.name);
}
return directors.length > 0 ? directors.join(', ') : t.notSpecified;
};

                        <div className="flex gap-1.5 shrink-0 items-center">
                            {(iAmHost || iAmMod) && (
                                <>
                                    <button onClick={() => { sendSystemAction('PAUSE'); handlePartySyncAction('pause'); }} className="bg-[#a855f7]/20 hover:bg-[#a855f7]/40 text-[#a855f7] border border-[#a855f7]/30 p-2 rounded-lg transition-colors outline-none shadow-sm" title="Mettre en pause (Global)"><Pause className="w-3.5 h-3.5 fill-current"/></button>
                                    <button onClick={() => { sendSystemAction('PLAY'); handlePartySyncAction('play_countdown'); }} className="bg-[#a855f7]/20 hover:bg-[#a855f7]/40 text-[#a855f7] border border-[#a855f7]/30 p-2 rounded-lg transition-colors outline-none shadow-sm" title="Relancer (Global)"><Play className="w-3.5 h-3.5 fill-current"/></button>
                                </>
                            )}
                            <button onClick={() => sendSystemAction('ADS')} className="bg-white/5 hover:bg-white/10 text-yellow-500 p-2 rounded-lg transition-colors outline-none" title="Je vois une pub"><ShieldCheck className="w-3.5 h-3.5"/></button>
                        </div>

                        {/* MENU DÉROULANT DES SERVEURS (Design Pro) */}
                        <div className="relative flex items-center bg-white/5 border border-white/10 rounded-xl px-2 py-1.5 shadow-inner group hover:bg-white/10 transition-colors cursor-pointer shrink-0">
                            <Server className="w-3 h-3 text-[#a855f7] mr-1.5 pointer-events-none shrink-0" />
                            <select 
                                value={selectedServer}
                                onChange={(e) => handlePlayRequest(e.target.value)}
                                className="appearance-none bg-transparent text-white/80 font-bold text-[9px] md:text-[10px] uppercase tracking-widest outline-none cursor-pointer pr-4 w-full"
                            >
                                {AVAILABLE_SERVERS.map(srv => <option key={srv.id} value={srv.id} className="bg-[#151520] text-white">{srv.name}</option>)}
                            </select>
                            <ChevronDown className="w-3 h-3 text-white/40 absolute right-2 pointer-events-none" />
                        </div>
                        
                        <button onClick={() => { document.body.classList.remove('party-mode'); onClose(); }} className="bg-white/10 hover:bg-white/20 border border-white/20 text-white px-3 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest flex items-center gap-1.5 transition-colors outline-none shadow-sm shrink-0 whitespace-nowrap">
                            <Minimize2 className="w-3.5 h-3.5" /> <span className="hidden xl:inline">{t.minimizeRoom}</span>
                        </button>
                        
                        {/* Bouton Quitter (Power Rouge Pro) en bas */}
                        <button onClick={() => setShowLeavePartyConfirm(true)} className="bg-red-500/10 hover:bg-red-500 border border-red-500/30 hover:border-red-500 text-red-400 hover:text-white px-3 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest flex items-center gap-1.5 transition-colors outline-none shadow-sm shrink-0 whitespace-nowrap">
                            <Power className="w-3.5 h-3.5" /> <span className="hidden xl:inline">{t.closeLive}</span>
                        </button>
                    </div>
                </div>
            </div>

            {/* Colonne Droite: Chat (Défile à l'intérieur de lui-même) */}
            <div className="flex-1 lg:w-[350px] xl:w-[400px] flex flex-col bg-[#0c0c10] border-t lg:border-t-0 lg:border-l border-white/5 relative z-40 min-h-0 shadow-[-20px_0_40px_rgba(0,0,0,0.8)]">
                
                {/* Header Chat / Code Caché Pro */}
                <div className="p-3 bg-black/60 border-b border-white/5 backdrop-blur-md relative z-20 shrink-0">
                    <div className="flex items-center gap-2 w-full bg-white/5 p-1.5 rounded-2xl border border-white/10">
                        <button onClick={() => setShowInviteModal(true)} className="flex-1 bg-black/40 hover:bg-white/10 text-white text-[9px] font-bold uppercase tracking-widest py-2.5 rounded-xl transition-colors flex flex-col lg:flex-row items-center justify-center gap-1 lg:gap-1.5 outline-none shadow-sm border border-white/5">
                            <Key className="w-3.5 h-3.5 text-[#a855f7]" /> <span className="text-center leading-tight whitespace-nowrap">{t.inviteCode}</span>
                        </button>
                        <div className="flex flex-col items-center px-1">
                            <span className="text-[7px] text-white/30 font-black tracking-widest">OU</span>
                        </div>
                        <button onClick={() => setShowUserSearch(true)} className="flex-1 bg-gradient-to-r from-purple-600/80 to-pink-600/80 hover:from-purple-600 hover:to-pink-600 text-white text-[9px] font-black uppercase tracking-widest py-2.5 rounded-xl transition-all active:scale-95 flex flex-col lg:flex-row items-center justify-center gap-1 lg:gap-1.5 outline-none shadow-inner border border-white/10">
                            <UserPlus className="w-3.5 h-3.5" /> <span className="text-center leading-tight whitespace-nowrap">{t.inviteFriendBtn}</span>
                        </button>
                    </div>
                </div>

                {/* Liste Membres */}
                <div className="px-3 py-2 border-b border-white/5 flex gap-2 overflow-x-auto no-scrollbar shrink-0 items-center bg-black/20">
                    {partyData.members?.map(m => {
                        const isMHost = m.uid === partyData.hostUid;
                        const isMMod = partyData.mods?.includes(m.uid);
                        return (
                        <div key={m.uid} onClick={(e) => { e.stopPropagation(); openMemberMenu(m); }} className={`relative group flex flex-col items-center shrink-0 ${m.uid !== user?.uid ? 'cursor-pointer hover:opacity-80' : ''}`}>
                            <div className={`w-8 h-8 rounded-full bg-[#151520] flex items-center justify-center font-black text-[12px] text-[#a855f7] border-[2px] shadow-sm overflow-hidden ${isMHost ? 'border-[#a855f7]' : (isMMod ? 'border-blue-500' : 'border-white/20')}`}>
                                {m.name?.charAt(0).toUpperCase() || '?'}
                            </div>
                            {isMHost && <div className="absolute -top-1 -right-1 w-3.5 h-3.5 bg-[#a855f7] rounded-full border-2 border-[#111116] flex items-center justify-center"><Star className="w-2 h-2 fill-white text-white"/></div>}
                            {isMMod && !isMHost && <div className="absolute -top-1 -right-1 w-3.5 h-3.5 bg-blue-500 rounded-full border-2 border-[#111116] flex items-center justify-center"><ShieldCheck className="w-2 h-2 fill-white text-white"/></div>}
                        </div>
                    )})}
                </div>

                {/* Messages du Chat (Style TikTok / Instagram Live sans bulles, propre) */}
                <div className="flex-1 overflow-y-auto p-3 flex flex-col gap-1 no-scrollbar bg-gradient-to-t from-black/80 via-black/40 to-transparent min-h-0">
                    
                    {/* Nouveau Pinned Message pour expliquer le lecteur */}
                    <div className="bg-[#a855f7]/10 border border-[#a855f7]/30 p-2.5 rounded-xl mb-3 flex gap-2.5 items-start shrink-0 shadow-inner">
                        <ShieldCheck className="w-4 h-4 text-[#a855f7] shrink-0 mt-0.5" />
                        <p className="text-[10px] md:text-[11px] text-[#a855f7] leading-snug">
                            <strong className="font-black uppercase tracking-widest block mb-0.5">{t.partyInfoPinTitle}</strong>
                            {t.partyInfoPinText}
                        </p>
                    </div>
                    
                    {partyData.messages?.filter(msg => !partyData.muted?.some(m => m.uid === msg.uid)).map((msg, i) => {
                        if (msg.isSystem) {
                            let sysText = msg.text || "";
                            if (msg.action === 'JOIN') sysText = `${t.sysJoined}`;
                            else if (msg.action === 'LEAVE') sysText = `${t.sysLeft}`;
                            else if (msg.action === 'PAUSE') sysText = `${t.sysPaused}`;
                            else if (msg.action === 'PLAY') sysText = `${t.sysPlayed}`;
                            else if (msg.action === 'ADS') sysText = `${t.sysAds}`;
                            else if (msg.action === 'BAN') sysText = `${t.sysBanned} ${msg.targetName} de la room.`;

                            return (
                                <div key={i} className={`flex items-start w-full group mb-2 p-1 -mx-1 rounded-lg ${msg.action === 'BAN' ? 'bg-red-500/10 border border-red-500/20' : ''}`}>
                                    <div className={`w-6 h-6 rounded-full border flex items-center justify-center mr-2.5 shrink-0 mt-0.5 shadow-sm ${msg.action === 'BAN' ? 'bg-red-500/20 border-red-500/30' : 'bg-[#a855f7]/20 border-[#a855f7]/30'}`}>
                                        {msg.action === 'BAN' ? <UserMinus className="w-3 h-3 text-red-500" /> : <Bell className="w-3 h-3 text-[#a855f7]" />}
                                    </div>
                                    <div className="flex-1 text-[12px] md:text-[13px] leading-snug drop-shadow-md break-words pt-0.5 text-white/60 italic">
                                        <span className={`font-bold mr-1 ${msg.action === 'BAN' ? 'text-red-500' : 'text-[#a855f7]'}`}>Alerte</span>
                                        <span className={msg.action === 'BAN' ? 'text-red-200/80' : 'text-white/60'}>{msg.name} {sysText}</span>
                                    </div>
                                </div>
                            );
                        }

                        const msgIsHost = msg.uid === partyData.hostUid;
                        const msgIsMod = partyData.mods?.includes(msg.uid);

                        return (
                        <div key={i} className="flex items-start w-full group mb-2 cursor-pointer hover:bg-white/5 p-1.5 -mx-1.5 rounded-lg transition-colors chat-msg">
                            {/* Avatar (Ouvre le menu modération) */}
                            <div onClick={(e) => { e.stopPropagation(); if(msg.uid !== user?.uid) openMemberMenu(msg); }} className="w-6 h-6 rounded-full bg-[#151520] flex items-center justify-center font-black text-[10px] text-[#a855f7] mr-2.5 shrink-0 border border-white/10 shadow-sm mt-0.5 hover:opacity-80">
                                {msg.name?.charAt(0).toUpperCase() || '?'}
                            </div>
                            
                            <div className="flex-1 text-[12px] md:text-[13px] leading-snug drop-shadow-md break-words pt-0.5" onClick={() => { if(msg.uid !== user?.uid) setReplyingTo({ name: msg.name, text: msg.text }) }}>
                                {/* Reply Indicator */}
                                {msg.replyTo && (
                                    <div className="text-[9px] text-white/40 mb-0.5 flex items-center gap-1.5 border-l-2 border-[#a855f7] pl-1.5">
                                        <Reply className="w-2.5 h-2.5" /> <span className="truncate max-w-[200px]"><strong className="text-white/60">{msg.replyTo.name}:</strong> {msg.replyTo.text}</span>
                                    </div>
                                )}
                                {/* Name + Message Stacked Inline */}
                                <span className={`font-black mr-2 ${msgIsHost ? 'text-[#a855f7]' : (msgIsMod ? 'text-blue-400' : 'text-white/70')}`}>
                                    {msg.name}
                                    {msgIsHost && <span className="bg-[#a855f7]/20 text-[#a855f7] text-[6px] px-1 py-0.5 rounded uppercase font-black border border-[#a855f7]/30 ml-1.5 align-middle">{t.hostBadge}</span>}
                                    {msgIsMod && !msgIsHost && <span className="bg-blue-500/20 text-blue-400 text-[6px] px-1 py-0.5 rounded uppercase font-black border border-blue-500/30 ml-1.5 align-middle">{t.modBadge}</span>}
                                </span>
                                <span className="text-white drop-shadow-sm">{msg.text}</span>
                            </div>
                        </div>
                    )})}
                    <div ref={chatEndRef} className="h-2 shrink-0" />
                </div>

                {/* Input Chat Fixé en bas */}
                <div className="p-3 border-t border-white/5 bg-[#0c0c10] shrink-0 z-20">
                    {replyingTo && (
                        <div className="flex items-center justify-between bg-white/5 px-3 py-2 rounded-t-xl border-x border-t border-white/10 -mt-8 mb-2">
                            <div className="text-[9px] md:text-[11px] text-white/60 truncate flex-1 flex items-center gap-1.5">
                                <Reply className="w-3.5 h-3.5 text-[#a855f7]" /> <span className="font-bold">{t.replyTo} {replyingTo.name}:</span> <span className="italic">{replyingTo.text}</span>
                            </div>
                            <button onClick={() => setReplyingTo(null)} className="text-white/40 hover:text-white p-1 outline-none"><X className="w-3.5 h-3.5" /></button>
                        </div>
                    )}
                    <div className={`relative flex items-center bg-[#1a1a24] border border-white/10 ${replyingTo ? 'rounded-b-xl rounded-tr-xl' : 'rounded-full'} p-1 transition-all focus-within:border-[#a855f7] shadow-inner`}>
                        <input 
                            type="text" 
                            maxLength="150"
                            value={chatInput}
                            onChange={(e) => setChatInput(e.target.value)}
                            onKeyDown={(e) => { if (e.key === 'Enter') { handleSendPartyMessage(chatInput, replyingTo); setChatInput(''); setReplyingTo(null); } }}
                            onFocus={(e) => {
                                setTimeout(() => {
                                    e.target.scrollIntoView({ behavior: 'smooth', block: 'end' });
                                    chatEndRef.current?.scrollIntoView();
                                }, 300);
                            }}
                            placeholder={t.chatPlaceholder}
                            className="w-full bg-transparent pl-4 pr-2 py-2.5 text-[12px] md:text-[13px] text-white outline-none"
                        />
                        <button 
                            onClick={() => { handleSendPartyMessage(chatInput, replyingTo); setChatInput(''); setReplyingTo(null); }} 
                            disabled={!chatInput.trim()}
                            className="w-8 h-8 shrink-0 rounded-full bg-[#a855f7] flex items-center justify-center text-white hover:bg-purple-500 disabled:opacity-50 disabled:bg-white/10 transition-colors outline-none"
                        >
                            <Send className="w-3.5 h-3.5 ml-0.5" />
                        </button>
                    </div>
                </div>
            </div>
        </div>
    );
}

// --- MODAL STANDARD (FILM CLASSIQUE EN PLEIN ÉCRAN TOTAL) ---
return (
<div className="fixed inset-0 z-[8000] bg-[#0a0a0f] flex flex-col overflow-x-hidden overflow-y-auto no-scrollbar animate-in fade-in duration-300">

{showDisclaimer && (
<div className="fixed inset-0 z-[9999] bg-black/90 backdrop-blur-md flex items-center justify-center p-4 overflow-y-auto">
<div className="bg-[#0a0a0f] border border-[#a855f7]/30 rounded-3xl p-6 md:p-8 max-w-xl w-full shadow-[0_0_50px_rgba(168,85,247,0.2)] animate-in zoom-in duration-300">
<h3 className="text-xl md:text-2xl font-black text-white mb-4 uppercase tracking-widest flex items-center gap-3 border-b border-white/10 pb-4">
<AlertTriangle className="text-red-500 w-8 h-8" /> {t.warningTitle}
</h3>
<div className="bg-gradient-to-r from-purple-900/40 to-pink-900/40 border border-[#a855f7]/50 p-5 rounded-2xl mb-6 shadow-[0_0_20px_rgba(168,85,247,0.15)]">
<h4 className="text-white font-black text-sm md:text-base mb-2 tracking-widest">{t.recommendationTitle}</h4>
<p className="text-white/80 text-xs md:text-sm leading-relaxed" dangerouslySetInnerHTML={{__html: t.recommendationText}}></p>
</div>
<p className="text-white/60 text-[10px] md:text-xs leading-relaxed mb-6 text-justify">{t.warningDisclaimer}</p>
<label className="flex items-start gap-3 cursor-pointer mb-8 bg-white/5 p-4 rounded-xl border border-white/10 hover:bg-white/10 transition-colors shadow-sm outline-none">
<input type="checkbox" checked={disclaimerAccepted} onChange={(e) => setDisclaimerAccepted(e.target.checked)} className="mt-0.5 w-5 h-5 accent-[#a855f7] cursor-pointer" />
<span className="text-white/90 text-xs md:text-sm font-bold leading-tight">{t.disclaimerCheckbox}</span>
</label>
<div className="flex justify-end gap-3 border-t border-white/10 pt-6">
<button onClick={() => setShowDisclaimer(false)} className="px-6 py-3 rounded-xl font-bold text-[11px] uppercase tracking-widest text-white/50 hover:text-white hover:bg-white/5 transition-colors outline-none">{t.cancel}</button>
<button disabled={!disclaimerAccepted} onClick={() => { setShowDisclaimer(false); setSelectedServer(pendingServer); setModalMode('play'); }} className="px-8 py-3 bg-[#a855f7] text-white rounded-xl font-black text-[11px] uppercase tracking-widest disabled:opacity-50 disabled:cursor-not-allowed hover:bg-purple-500 transition-all shadow-[0_0_20px_rgba(168,85,247,0.4)] outline-none">{t.acceptPlay}</button>
</div>
</div>
</div>
)}

<div className="w-full flex-1 flex flex-col bg-[#0a0a0f] z-10 relative min-h-screen">
    {/* HEADER PLEIN ÉCRAN */}
    <div className="w-full bg-black/60 backdrop-blur-md border-b border-white/5 flex justify-between items-center px-4 md:px-10 py-3 md:py-4 shrink-0 sticky top-0 z-[60] shadow-md">
    <div className="flex items-center gap-2">
    <LevelMovieLogo className="w-5 h-5 md:w-6 md:h-6 text-[#a855f7]" />
    <span className="text-white font-black tracking-[0.2em] text-sm md:text-base uppercase drop-shadow-md">Level<span className="text-[#a855f7]">Movie</span></span>
    </div>
    <button onClick={onClose} className="flex items-center gap-2 px-5 py-2.5 bg-white/5 text-white/50 hover:text-white border border-white/10 hover:border-white/20 hover:bg-white/10 rounded-full text-[10px] md:text-xs font-black uppercase tracking-widest transition-all shadow-sm active:scale-95 outline-none">
    <X className="w-4 h-4 md:w-5 md:h-5" /> <span className="hidden sm:inline">{t.closePlayer}</span>
    </button>
    </div>

    {/* LECTEUR VIDÉO (Prend toute la largeur) */}
    <div className="relative pt-[56.25%] md:h-[70vh] md:pt-0 w-full bg-black shrink-0 overflow-hidden border-b border-white/10 shadow-lg flex items-center justify-center">
    {loading ? (
    <div className="absolute inset-0 flex items-center justify-center bg-black/80">
    <div className="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-[#a855f7]"></div>
    </div>
    ) : error ? (
    <div className="absolute inset-0 flex flex-col items-center justify-center bg-[#060608] text-center p-6 border-b border-[#a855f7]/30">
    <LevelMovieLogo className="w-12 h-12 text-[#a855f7] mb-6 opacity-80" />
    <div className="bg-red-500/10 p-4 rounded-full mb-4">
    <AlertTriangle className="w-8 h-8 text-red-400" />
    </div>
    <h3 className="text-lg font-black mb-2 text-white uppercase tracking-widest drop-shadow-md">{t.notFound}</h3>
    <p className="text-white/60 text-xs max-w-sm">{t.contentUnavailableDesc}</p>
    </div>
    ) : renderIframe()}
    </div>

    {/* CORPS DE LA PAGE */}
    <div className="p-5 md:p-10 lg:p-14 shrink-0 bg-gradient-to-b from-[#15092a]/30 to-[#0a0a0f] flex-1 pb-32 w-full mx-auto">

    {modalMode === 'play' && (
    <div className="mb-8 flex flex-col gap-5 bg-black/40 p-5 md:p-6 rounded-2xl border border-white/5 shadow-inner max-w-5xl mx-auto">
    <div className="flex justify-between items-center mb-2">
    <span className="text-[11px] font-black text-white/70 uppercase tracking-widest"><Server className="w-4 h-4 inline mr-2 text-[#a855f7]" /> {t.externalSources}</span>
    <button onClick={() => setModalMode('info')} className="text-[10px] font-bold text-white/50 hover:text-white uppercase tracking-widest border border-white/10 px-3 py-1.5 rounded-lg hover:bg-white/10 transition-colors outline-none"><Info className="w-3 h-3 inline mr-1" /> {t.movieInfo}</button>
    </div>
    <p className="text-[10px] text-[#a855f7] mb-2 font-bold uppercase tracking-widest">
    <Info className="w-3 h-3 inline mr-1" /> {t.audioTip}
    </p>
    <div className="flex flex-wrap gap-3">
    
    {AVAILABLE_SERVERS.map(srv => (
    <button key={srv.id} onClick={() => handlePlayRequest(srv.id)} className={`px-4 py-2.5 rounded-xl text-[10px] font-bold uppercase transition-all outline-none ${selectedServer === srv.id ? 'bg-[#a855f7] text-white shadow-[0_0_15px_rgba(168,85,247,0.3)]' : 'bg-white/5 text-white/70 border border-white/10 hover:bg-white/10'}`}>
    {srv.name}
    </button>
    ))}

    {/* Domaine Public */}
    {(movie.release_date && parseInt(movie.release_date.substring(0, 4)) <= 1970) && (
    <button onClick={() => handlePlayRequest('archive')} className={`px-4 py-2.5 rounded-xl text-[10px] font-bold uppercase transition-all outline-none ${selectedServer === 'archive' ? 'bg-[#a855f7] text-white border border-[#a855f7]/30 shadow-[0_0_15px_rgba(168,85,247,0.3)]' : 'bg-white/5 text-white/70 border border-white/10 hover:bg-white/10'}`}>
    <Library className="w-3 h-3 inline mr-1 text-gray-400" /> {t.publicDomainDirect}
    </button>

    {/* Serveur Direct (HD) */}
    {getYoutubeFullKey() && (
    <button onClick={() => handlePlayRequest('youtube_full')} className={`ml-auto px-4 py-2.5 rounded-xl text-[10px] font-bold uppercase transition-all outline-none ${selectedServer === 'youtube_full' ? 'bg-[#a855f7] text-white border border-[#a855f7]/50 shadow-[0_0_15px_rgba(168,85,247,0.4)]' : 'bg-white/5 text-white/70 border border-white/20 hover:bg-white/10'}`}>
    <Clapperboard className="w-3 h-3 inline mr-1 text-[#a855f7]" /> {t.youtubeFull}
    </button>
    )}
    </div>
    </div>
    )}

    {(modalMode === 'info' || modalMode === 'trailer') && details && (
    <div className="flex flex-col lg:flex-row gap-10 lg:gap-16 max-w-7xl mx-auto">
    <div className="flex-1">
    <h2 className="text-4xl md:text-6xl font-black mb-4 text-white uppercase tracking-tighter drop-shadow-lg leading-tight">
    {movie.title || movie.name || movie.original_name}
    </h2>
    <div className="text-[#a855f7] italic text-base md:text-lg font-medium mb-6 drop-shadow-sm flex items-center gap-2">
    <span>{details.tagline ? `"${details.tagline}"` : ''}</span>
    </div>

    <div className="flex items-center space-x-4 mb-8 flex-wrap gap-y-4">
    <span className="text-green-400 font-black text-xs md:text-sm uppercase tracking-widest border border-green-400/30 px-3 py-1.5 rounded bg-green-400/10 shadow-sm">{t.match}</span>
    {details.status && <span className="text-blue-400 font-bold text-xs md:text-sm uppercase tracking-widest border border-blue-400/30 px-3 py-1.5 rounded bg-blue-400/10">{details.status}</span>}
    <span className="text-white/80 font-bold text-sm md:text-base border-l border-white/20 pl-4">{(movie.release_date || movie.first_air_date || '').substring(0, 4)}</span>
    <span className="text-white/80 font-bold text-sm md:text-base border-l border-white/20 pl-4">{getFormatRuntime()}</span>
    {details.original_language && <span className="text-white/60 font-bold text-xs uppercase tracking-widest border-l border-white/20 pl-4">{t.originalLang}: {details.original_language.toUpperCase()}</span>}
    <span className="px-2.5 py-1.5 border border-white/20 rounded text-[10px] font-bold text-white uppercase tracking-widest bg-white/5 shadow-sm border-l border-white/20 pl-4 ml-2">HD 1080p</span>
    </div>

    <div className="mb-6">
    <span className="text-white/40 font-bold text-[10px] uppercase tracking-widest block mb-1">{t.originalTitle}</span>
    <span className="text-white/70 font-medium text-sm italic">{details.original_title || details.original_name || t.notSpecified}</span>
    </div>

    {/* BOUTONS D'ACTION DU FILM */}
    <div className="flex flex-col sm:flex-row flex-wrap gap-4 mb-8">
        
        {/* Play */}
        <button onClick={() => handlePlayRequest(selectedServer)} className="flex-1 items-center justify-center flex gap-3 px-6 py-4 bg-gradient-to-r from-purple-600 to-pink-600 text-white rounded-xl text-xs md:text-sm font-black uppercase tracking-widest hover:opacity-90 transition-all shadow-[0_0_30px_rgba(168,85,247,0.4)] active:scale-95 outline-none">
            <Play className="w-5 h-5 fill-white" /> <span>{t.playMovie}</span>
        </button>

        {/* Bande-Annonce */}
        <button
            onClick={() => {
                if (modalMode !== 'trailer') {
                    setIframeLoading(true);
                    setModalMode('trailer');
                    window.scrollTo({top: 0, behavior: 'smooth'});
                }
            }}
            disabled={modalMode === 'trailer'}
            className={`flex-1 items-center justify-center flex gap-3 px-6 py-4 rounded-xl text-xs md:text-sm font-black uppercase tracking-widest transition-all active:scale-95 outline-none ${
                modalMode === 'trailer'
                ? 'bg-[#a855f7]/10 border border-[#a855f7]/50 text-[#a855f7] cursor-default shadow-inner'
                : 'bg-white/5 border border-white/20 text-white hover:bg-white/10 backdrop-blur-md shadow-md'
            }`}>
            {modalMode === 'trailer' ? (
                <>
                    <div className="flex gap-1.5 items-center justify-center">
                        <div className="w-2 h-2 bg-[#a855f7] rounded-full animate-bounce"></div>
                        <div className="w-2 h-2 bg-[#a855f7] rounded-full animate-bounce" style={{animationDelay: "0.1s"}}></div>
                        <div className="w-2 h-2 bg-[#a855f7] rounded-full animate-bounce" style={{animationDelay: "0.2s"}}></div>
                    </div>
                    <span>{t.trailerPlaying}</span>
                </>
            ) : (
                <><Clapperboard className="w-5 h-5" /> <span>{t.trailer}</span></>
            )}
        </button>

        {/* Watch Party */}
        <button onClick={() => handleCreateParty(movie)} className={`flex-1 items-center justify-center flex gap-3 px-6 py-4 bg-white/5 border border-[#a855f7]/50 text-white rounded-xl text-xs md:text-sm font-bold uppercase tracking-widest hover:bg-[#a855f7]/20 hover:border-[#a855f7] transition-all active:scale-95 outline-none shadow-md`}>
            <WatchPartySVG className="w-5 h-5 text-[#a855f7]" /> <span>{t.createPartyBtn}</span>
        </button>
    </div>

    <div className="markdown-pro pr-2 text-justify text-base md:text-lg leading-relaxed text-white/80">
    {movie.overview ? movie.overview.split('\n').filter(p=>p.trim()).map((p,i) => <p key={i} className="mb-4">{p}</p>) : <p>{t.noDesc}</p>}
    </div>

    <div className="mt-10 flex gap-4 pt-8 border-t border-white/10">
    <button onClick={() => toggleWatchlist(movie)} className={`flex-1 flex items-center justify-center gap-3 px-6 py-4 rounded-xl border transition-all active:scale-95 outline-none ${isAddedToWatchlist ? 'bg-green-500/10 border-green-500/30 text-green-400' : 'bg-white/5 border-white/20 text-white/80 hover:bg-white/10'}`}>
    {isAddedToWatchlist ? <><CheckCircle className="w-6 h-6" /><span className="text-xs md:text-sm font-bold uppercase tracking-widest">{t.alreadyInList}</span></> : <><Plus className="w-6 h-6 text-[#a855f7]" /><span className="text-xs md:text-sm font-bold uppercase tracking-widest">{t.addToList}</span></>}
    </button>
    <button onClick={handleShare} className="flex items-center justify-center gap-3 px-8 py-4 rounded-xl border border-white/20 bg-white/5 text-white/80 hover:text-white hover:bg-white/10 transition-all active:scale-95 outline-none">
    <Share2 className="w-6 h-6 text-blue-400" />
    </button>
    </div>
    </div>

    <div className="w-full lg:w-[40%] space-y-8 bg-black/40 p-6 md:p-8 rounded-3xl border border-white/5 shadow-inner h-fit">
    <div>
    <span className="text-white/40 font-bold block mb-4 uppercase tracking-widest text-xs flex items-center gap-2"><Users className="w-5 h-5 text-[#a855f7]" /> <span>{t.cast}</span></span>
    <div className="flex gap-5 overflow-x-auto no-scrollbar pb-3 row-container cursor-grab active:cursor-grabbing">
    {details.credits?.cast?.slice(0, 15).map(c => (
    <div key={c.id} className="flex flex-col items-center min-w-[80px] gap-2 shrink-0 select-none">
    <img src={c.profile_path ? `https://image.tmdb.org/t/p/w185${c.profile_path}` : `https://ui-avatars.com/api/?name=${encodeURIComponent(c.name)}&background=151520&color=a855f7`} className="w-16 h-16 md:w-20 md:h-20 rounded-full object-cover border border-white/10 shadow-md bg-black/50" draggable="false" alt=""/>
    <span className="text-[10px] md:text-xs text-white/90 text-center font-bold w-[90px] truncate px-1">{c.name}</span>
    {c.character && <span className="text-[9px] md:text-[10px] text-[#a855f7] truncate w-[90px] text-center">{c.character}</span>}
    </div>
    )) || <span className="text-white/50 text-sm">{t.noCasting}</span>}
    </div>
    </div>
    <div className="w-full h-px bg-white/10"></div>
    <div>
    <span className="text-white/40 font-bold block mb-2 uppercase tracking-widest text-xs flex items-center gap-2"><Film className="w-5 h-5 text-[#a855f7]" /> {t.director}</span>
    <span className="text-white/90 font-medium text-sm block mt-2">{getDirector()}</span>
    </div>
    </div>
    </div>
    )}

    {details && details.similar?.results?.length > 0 && (
    <div className="mt-16 pt-10 border-t border-white/10 max-w-7xl mx-auto">
    <h3 className="text-white/90 text-lg md:text-xl font-black mb-6 uppercase tracking-[0.2em] border-l-4 border-[#a855f7] pl-4">{t.similar}</h3>
    <div className="flex overflow-x-auto gap-5 no-scrollbar pb-6 row-container cursor-grab active:cursor-grabbing">
    {details.similar.results.slice(0, 10).map(sm => {
    if(!sm.poster_path) return null;
    return (
    <div key={sm.id} className="relative flex-none cursor-pointer rounded-2xl overflow-hidden shadow-xl border border-white/5 bg-[#151520] hover:scale-105 transition-transform w-[140px] md:w-[180px] h-[210px] md:h-[270px]" onClick={() => onSelectSimilar(sm)}>
    <img className="object-cover w-full h-full" src={`${IMAGE_BASE_URL}${sm.poster_path}`} loading="lazy" draggable="false" alt=""/>
    </div>
    )
    })}
    </div>
    </div>
    )}
    </div>
</div>

</div>
);
}

const rootElement = document.getElementById('root');
const root = createRoot(rootElement);
root.render(<App />);
</script>
</body>
</html>
